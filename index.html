<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Triple One OS V2</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Mobile Optimizations */
        input, select, textarea { font-size: 16px !important; }
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 80px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { 
            background-color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* Smooth tab transitions */
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-900 antialiased selection:bg-indigo-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS COMPONENT ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                calculator: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
                layers: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
                pieChart: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>,
                check: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
                bell: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
                trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            };
            return icons[name] || null;
        };

        // --- QUOTER MODULE ---
        const QuoterModule = ({ onPushToPipeline }) => {
            const [customer, setCustomer] = useState('');
            const [desc, setDesc] = useState('');
            const [qty, setQty] = useState(1);
            const [blankCost, setBlankCost] = useState(0);
            const [decoType, setDecoType] = useState('dtf');
            const [decoSize, setDecoSize] = useState('small');
            const [stitches, setStitches] = useState(10000);
            const [margin, setMargin] = useState(35);

            const STITCH_MATRIX = [
                { maxStitch: 8000, prices: [15, 15, 14.5, 14.5, 14] },
                { maxStitch: 15000, prices: [22.5, 22, 21, 21, 20] },
                { maxStitch: 20000, prices: [30, 28, 27, 27, 25] },
                { maxStitch: Infinity, prices: [50, 45, 43, 43, 40] }
            ];
            const QTY_TIERS = [{ max: 10, index: 0 }, { max: 49, index: 1 }, { max: 100, index: 2 }, { max: 299, index: 3 }, { max: Infinity, index: 4 }];
            const DTF_FEES = { small: 11.33, medium: 16.00, large: 22.00 };

            const getEmbroideryCost = (s, q) => {
                if (!s || s <= 0) return 0;
                const row = STITCH_MATRIX.find(r => s <= r.maxStitch) || STITCH_MATRIX[STITCH_MATRIX.length - 1];
                const col = QTY_TIERS.find(tier => q <= tier.max) || QTY_TIERS[QTY_TIERS.length - 1];
                return row.prices[col.index];
            };

            const clientGarmentPrice = (parseFloat(blankCost) || 0) / (1 - ((parseFloat(margin) || 0) / 100));
            const decoCost = decoType === 'dtf' ? (DTF_FEES[decoSize] || 0) : getEmbroideryCost(parseFloat(stitches), parseFloat(qty));
            const pricePerPiece = clientGarmentPrice + decoCost;
            const totalQuote = pricePerPiece * (parseFloat(qty) || 1);

            return (
                <div className="space-y-6 fade-in">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                        <h2 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <Icon name="calculator" size={18} className="text-indigo-600" /> Quick Quote
                        </h2>
                        <div className="space-y-4">
                            <input type="text" placeholder="Customer Name" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={customer} onChange={e => setCustomer(e.target.value)} />
                            <div className="grid grid-cols-2 gap-4">
                                <input type="text" placeholder="Item (e.g. Hoodies)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={desc} onChange={e => setDesc(e.target.value)} />
                                <input type="number" placeholder="Qty" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold" value={qty} onChange={e => setQty(e.target.value)} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <input type="number" placeholder="Blank Cost $" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={blankCost} onChange={e => setBlankCost(e.target.value)} />
                                <input type="number" placeholder="Margin %" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-indigo-600" value={margin} onChange={e => setMargin(e.target.value)} />
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setDecoType('dtf')} className={`flex-1 py-2 rounded-lg text-xs font-bold border ${decoType === 'dtf' ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-slate-200 text-slate-500'}`}>DTF</button>
                                <button onClick={() => setDecoType('embroidery')} className={`flex-1 py-2 rounded-lg text-xs font-bold border ${decoType === 'embroidery' ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-slate-200 text-slate-500'}`}>Embroidery</button>
                            </div>
                            {decoType === 'dtf' ? (
                                <select className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={decoSize} onChange={e => setDecoSize(e.target.value)}>
                                    <option value="small">Small (Left Chest)</option>
                                    <option value="medium">Medium (Youth)</option>
                                    <option value="large">Large (Full Back)</option>
                                </select>
                            ) : (
                                <input type="number" placeholder="Est. Stitches" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={stitches} onChange={e => setStitches(e.target.value)} />
                            )}
                        </div>
                    </div>
                    <div className="bg-slate-900 text-white p-5 rounded-2xl shadow-lg">
                        <div className="flex justify-between items-center border-b border-slate-700 pb-3 mb-3">
                            <span className="text-slate-400 text-xs font-bold uppercase tracking-widest">Price / ea</span>
                            <span className="text-xl font-bold">${pricePerPiece.toFixed(2)}</span>
                        </div>
                        <div className="flex justify-between items-center mb-4">
                            <span className="text-slate-300 text-sm font-black uppercase">Total Quote</span>
                            <span className="text-3xl font-black text-emerald-400">${totalQuote.toFixed(2)}</span>
                        </div>
                        <button onClick={() => onPushToPipeline({ id: `JOB-${Date.now().toString().slice(-4)}`, customer, desc: `${qty}x ${desc}`, stage: 'new', balance: totalQuote/2, total: totalQuote })} className="w-full bg-indigo-600 py-4 rounded-xl font-bold active:scale-95 transition-all">Collect Deposit & Start</button>
                    </div>
                </div>
            );
        };

        // --- LEDGER MODULE ---
        const LedgerModule = ({ transactions, onAddTransaction, onDeleteTransaction }) => {
            const [amount, setAmount] = useState('');
            const [note, setNote] = useState('');
            const [cat, setCat] = useState('Income: Product Sales');

            const CATS = ['Income: Product Sales', 'Expense: Blanks', 'Expense: Consumables', 'Expense: Spoilage', 'Expense: Utilities', 'Expense: Vehicle', 'Expense: Software'];

            const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);

            return (
                <div className="space-y-6 fade-in">
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                            <span className="text-[10px] font-black text-slate-400 uppercase">Gross Income</span>
                            <p className="text-xl font-black text-emerald-600 mt-1">${income.toFixed(2)}</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                            <span className="text-[10px] font-black text-slate-400 uppercase">Net Profit</span>
                            <p className="text-xl font-black text-indigo-600 mt-1">${(income - expense).toFixed(2)}</p>
                        </div>
                    </div>
                    <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                        <h2 className="text-sm font-black mb-4 flex items-center gap-2"><Icon name="pieChart" size={18} className="text-indigo-600"/> Quick Log</h2>
                        <div className="space-y-4">
                            <input type="number" placeholder="Amount $" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold" value={amount} onChange={e => setAmount(e.target.value)} />
                            <select className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl" value={cat} onChange={e => setCat(e.target.value)}>
                                {CATS.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <input type="text" placeholder="Note" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl" value={note} onChange={e => setNote(e.target.value)} />
                            <button onClick={() => { onAddTransaction({ id: Date.now(), amount: parseFloat(amount), category: cat, note, type: cat.startsWith('Income') ? 'income' : 'expense', date: new Date().toLocaleDateString() }); setAmount(''); setNote(''); }} className="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Save Record</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="p-4 bg-slate-50 text-[10px] font-black text-slate-400 uppercase">Recent Activity</div>
                        <div className="divide-y divide-slate-100 max-h-[40vh] overflow-y-auto">
                            {transactions.length === 0 ? <p className="p-8 text-center text-slate-400 text-sm">No records found.</p> : transactions.map(t => (
                                <div key={t.id} className="p-4 flex justify-between items-center group">
                                    <div>
                                        <p className="text-sm font-bold">{t.category.split(': ')[1] || t.category}</p>
                                        <p className="text-[10px] text-slate-400">{t.date} • {t.note}</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className={`text-sm font-black ${t.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>{t.type === 'income' ? '+' : '-'}${t.amount.toFixed(2)}</span>
                                        <button onClick={() => onDeleteTransaction(t.id)} className="text-slate-300 hover:text-red-500"><Icon name="trash" size={16}/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('pipeline');

            // Persistence Logic
            const [orders, setOrders] = useState(() => {
                const saved = localStorage.getItem('t1_orders');
                return saved ? JSON.parse(saved) : [];
            });

            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('t1_ledger');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => { localStorage.setItem('t1_orders', JSON.stringify(orders)); }, [orders]);
            useEffect(() => { localStorage.setItem('t1_ledger', JSON.stringify(transactions)); }, [transactions]);

            const STAGES = [
                { id: 'new', label: 'New / Paid', color: 'bg-slate-100 text-slate-700' },
                { id: 'ordering', label: 'Ordering Blanks', color: 'bg-amber-100 text-amber-800' },
                { id: 'receiving', label: 'Receiving Blanks', color: 'bg-orange-100 text-orange-800' },
                { id: 'prepping', label: 'Prepping / DTF', color: 'bg-indigo-100 text-indigo-800' },
                { id: 'printing', label: 'Embroidery / Print', color: 'bg-blue-100 text-blue-800' },
                { id: 'pickup', label: 'Ready for Pickup', color: 'bg-emerald-100 text-emerald-800' }
            ];

            const moveOrder = (id, newStage) => setOrders(orders.map(o => o.id === id ? { ...o, stage: newStage } : o));
            const deleteOrder = (id) => confirm("Delete this order?") && setOrders(orders.filter(o => o.id !== id));

            const handlePushToPipeline = (newOrder) => {
                setOrders([newOrder, ...orders]);
                const deposit = newOrder.total - newOrder.balance;
                setTransactions([{ id: Date.now(), amount: deposit, category: 'Income: Product Sales', note: `Deposit: ${newOrder.customer}`, type: 'income', date: new Date().toLocaleDateString() }, ...transactions]);
                setActiveTab('pipeline');
            };

            const renderPipeline = () => (
                <div className="flex overflow-x-auto hide-scrollbar gap-4 pb-4 -mx-4 px-4 snap-x">
                    {STAGES.map(stage => {
                        const items = orders.filter(o => o.stage === stage.id);
                        return (
                            <div key={stage.id} className="min-w-[300px] w-80 flex-shrink-0 snap-center bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col max-h-[75vh]">
                                <div className={`p-5 border-b border-slate-100 rounded-t-3xl font-black text-xs flex justify-between items-center uppercase tracking-widest ${stage.color}`}>
                                    {stage.label} <span className="bg-white/50 px-2 py-0.5 rounded-full">{items.length}</span>
                                </div>
                                <div className="p-4 overflow-y-auto space-y-4 flex-1 bg-slate-50/30">
                                    {items.length === 0 ? <p className="text-[10px] text-slate-400 text-center py-10 font-bold uppercase">No Active Jobs</p> : items.map(order => (
                                        <div key={order.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 relative">
                                            <div className="flex justify-between items-start mb-2">
                                                <span className="text-[10px] font-black text-slate-400">{order.id}</span>
                                                <button onClick={() => deleteOrder(order.id)} className="text-slate-200 hover:text-red-400"><Icon name="trash" size={14}/></button>
                                            </div>
                                            <h4 className="font-bold text-slate-800 text-sm">{order.customer || 'Unknown Customer'}</h4>
                                            <p className="text-xs text-slate-500 mt-1 mb-4">{order.desc}</p>
                                            <div className="flex justify-between items-center mb-4">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase">Balance Due</span>
                                                <span className={`text-xs font-black ${order.balance > 0 ? 'text-rose-500' : 'text-emerald-500'}`}>${order.balance.toFixed(2)}</span>
                                            </div>
                                            <select value={order.stage} onChange={(e) => moveOrder(order.id, e.target.value)} className="w-full bg-slate-50 border border-slate-200 text-xs font-bold p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                                                {STAGES.map(s => <option key={s.id} value={s.id}>Move to: {s.label}</option>)}
                                            </select>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );

            return (
                <div className="min-h-screen pb-safe flex flex-col">
                    <div className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30">
                        <div className="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
                            <h1 className="text-xl font-black tracking-tighter text-slate-800 flex items-center gap-2">
                                <div className="bg-indigo-600 text-white p-1.5 rounded-xl shadow-md shadow-indigo-200"><Icon name="layers" size={20} /></div>
                                TRIPLE ONE OS
                            </h1>
                            <div className="w-9 h-9 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600 font-black text-xs border-2 border-white shadow-sm">LG</div>
                        </div>
                    </div>

                    <div className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6">
                        {activeTab === 'pipeline' && renderPipeline()}
                        {activeTab === 'quoter' && <QuoterModule onPushToPipeline={handlePushToPipeline} />}
                        {activeTab === 'ledger' && <LedgerModule transactions={transactions} onAddTransaction={(t) => setTransactions([t, ...transactions])} onDeleteTransaction={(id) => setTransactions(transactions.filter(tx => tx.id !== id))} />}
                    </div>

                    <div className="fixed bottom-0 w-full bg-white border-t border-slate-200 pb-[env(safe-area-inset-bottom)] z-40 shadow-[0_-10px_30px_-10px_rgba(0,0,0,0.1)]">
                        <div className="flex justify-around max-w-md mx-auto">
                            <button onClick={() => setActiveTab('quoter')} className={`flex flex-col items-center p-4 w-full transition-all ${activeTab === 'quoter' ? 'text-indigo-600 scale-110' : 'text-slate-400 opacity-60'}`}>
                                <Icon name="calculator" size={26} />
                                <span className="text-[9px] font-black mt-1 uppercase tracking-tighter">Quoter</span>
                            </button>
                            <button onClick={() => setActiveTab('pipeline')} className={`flex flex-col items-center p-4 w-full transition-all ${activeTab === 'pipeline' ? 'text-indigo-600 scale-110' : 'text-slate-400 opacity-60'}`}>
                                <Icon name="layers" size={26} />
                                <span className="text-[9px] font-black mt-1 uppercase tracking-tighter">Pipeline</span>
                            </button>
                            <button onClick={() => setActiveTab('ledger')} className={`flex flex-col items-center p-4 w-full transition-all ${activeTab === 'ledger' ? 'text-indigo-600 scale-110' : 'text-slate-400 opacity-60'}`}>
                                <Icon name="pieChart" size={26} />
                                <span className="text-[9px] font-black mt-1 uppercase tracking-tighter">Ledger</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
