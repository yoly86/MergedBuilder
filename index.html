        /* Prevent auto-zoom on iOS Safari */
        input[type="text"], input[type="number"], input[type="date"], select, textarea {
            font-size: 16px !important;
        }
        
        /* Padding for safe areas and fixed navigation */
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .pb-content { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 90px); }
        
        /* Print Styles */
        @media print {
            @page { margin: 0; }
            body { background-color: white !important; margin: 1cm !important; }
            .no-print { display: none !important; }
            .print-full-width { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .print-no-shadow { box-shadow: none !important; border: none !important; }
            .page-container { background: transparent !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        
        /* Hide arrows on number inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* Custom Scrollbar */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Document Wrapper for a premium feel */
        .page-container {
            background: white;
            max-width: 8.5in;
            margin: 0 auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border-radius: 0.75rem;
        }

        /* Smooth inputs */
        .soft-input {
            background-color: #f8fafc; /* slate-50 */
            border: 1px solid #e2e8f0; /* slate-200 */
            transition: all 0.2s ease;
        }
        .soft-input:focus {
            background-color: #ffffff;
            border-color: #818cf8; /* indigo-400 */
            box-shadow: 0 0 0 3px #e0e7ff; /* indigo-100 */

            ]
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            // Module State
            const [appModule, setAppModule] = useState('quoter'); // 'quoter' or 'bookkeeping'
            const [quoterTab, setQuoterTab] = useState('build');
            const [bookTab, setBookTab] = useState('dashboard'); // 'dashboard', 'quick', 'income', 'expenses', 'setup'

            // --- QUOTER STATE ---
            const [showBusinessDetails, setShowBusinessDetails] = useState(false);
            const [orderData, setOrderData] = useState({
                businessName: '', businessAddress: '', businessPhone: '', businessEmail: '', businessWebsite: '',
                customerName: '', orderName: '', dateRequired: '', orderDescription: '', designNotes: '', mockupImage: null,
                setupFees: '', digitizingFee: '', digitizingCost: '', taxRate: 5, discount: '', machineReservePercent: '5', amountPaid: '', receiptNotes: '' 
            });
            const [items, setItems] = useState([{
                id: genId(), name: '', color: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35,
                sizes: generateEmptySizes(),
                locations: [ { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' } ]
            }]);
            
            const [isLoggedToBookkeeping, setIsLoggedToBookkeeping] = useState(false);

            // --- BOOKKEEPING STATE ---
            const [dashView, setDashView] = useState('annual'); // 'annual' or '5year'
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [transactions, setTransactions] = useState([]);
            
            // Customizable Lists State
            const [accounts, setAccounts] = useState(() => {
                try { return JSON.parse(localStorage.getItem('hybrid_bk_accounts')) || DEFAULT_ACCOUNTS; }
                catch { return DEFAULT_ACCOUNTS; }
            });
            const [categories, setCategories] = useState(() => {
                try { return JSON.parse(localStorage.getItem('hybrid_bk_categories')) || DEFAULT_CATEGORIES; }
                catch { return DEFAULT_CATEGORIES; }
            });

            // Modals & UI states
            const [quickAction, setQuickAction] = useState(null); // 'sale', 'expense', 'drive', 'loan'
            const [loanActionType, setLoanActionType] = useState('repayment');
            const [itemToDelete, setItemToDelete] = useState(null);
            
            // Setup Inputs
            const [newAccount, setNewAccount] = useState('');
            const [newIncCat, setNewIncCat] = useState('');
            const [newExpCat, setNewExpCat] = useState('');

            // Load/Save Bookkeeping Data
            useEffect(() => {
                const savedData = localStorage.getItem('hybrid_bookkeeper_data');
                if (savedData) {
                    try { setTransactions(JSON.parse(savedData)); } 
                    catch (e) { console.error("Failed to parse bookkeeping data", e); }
                }

                // Migrate returning users to have the new loan categories automatically
                const savedCats = JSON.parse(localStorage.getItem('hybrid_bk_categories'));
                if (savedCats) {
                    let updated = false;
                    if (!savedCats.income.includes('Loan / Financing Received')) { savedCats.income.push('Loan / Financing Received'); updated = true; }
                    if (!savedCats.expense.includes('Loan Repayment (Principal)')) { savedCats.expense.push('Loan Repayment (Principal)'); updated = true; }
                    if (!savedCats.expense.includes('Loan Interest (Tax Deductible)')) { savedCats.expense.push('Loan Interest (Tax Deductible)'); updated = true; }
                    if (updated) {
                        setCategories(savedCats);
                        localStorage.setItem('hybrid_bk_categories', JSON.stringify(savedCats));
                    }
                }
            }, []);

            useEffect(() => { localStorage.setItem('hybrid_bookkeeper_data', JSON.stringify(transactions)); }, [transactions]);
            useEffect(() => { localStorage.setItem('hybrid_bk_accounts', JSON.stringify(accounts)); }, [accounts]);
            useEffect(() => { localStorage.setItem('hybrid_bk_categories', JSON.stringify(categories)); }, [categories]);


            // --- QUOTER FUNCTIONS ---
            const updateOrder = (field, value) => {
                setOrderData(prev => ({ ...prev, [field]: value }));
                // Reset logged state if pricing fields change
                if(['taxRate', 'discount', 'amountPaid', 'setupFees', 'digitizingFee'].includes(field)) {
                    setIsLoggedToBookkeeping(false);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { updateOrder('mockupImage', reader.result); };
                    reader.readAsDataURL(file);
                }
                e.target.value = null;
            };

            const updateItem = (itemId, field, value) => {
                setItems(items.map(item => item.id === itemId ? { ...item, [field]: value } : item));
                setIsLoggedToBookkeeping(false);
            };
            const updateSize = (itemId, sizeKey, value) => {
                setItems(items.map(item => item.id === itemId ? { ...item, sizes: { ...item.sizes, [sizeKey]: value } } : item));
                setIsLoggedToBookkeeping(false);
            };
            const addLocation = (itemId) => {
                setItems(items.map(item => item.id === itemId ? { ...item, locations: [...item.locations, { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' }] } : item));
                setIsLoggedToBookkeeping(false);
            };
            const updateLocation = (itemId, locId, field, value) => {
                setItems(items.map(item => item.id === itemId ? { ...item, locations: item.locations.map(loc => loc.id === locId ? { ...loc, [field]: value } : loc) } : item));
                setIsLoggedToBookkeeping(false);
            };
            const removeLocation = (itemId, locId) => {
                setItems(items.map(item => item.id === itemId ? { ...item, locations: item.locations.filter(loc => loc.id !== locId) } : item));
                setIsLoggedToBookkeeping(false);
            };
            const addItem = () => setItems([...items, { id: genId(), name: '', color: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35, sizes: generateEmptySizes(), locations: [ { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' } ] }]);
            const duplicateItem = (itemToCopy) => {
                setItems([...items, { ...JSON.parse(JSON.stringify(itemToCopy)), id: genId(), locations: itemToCopy.locations.map(loc => ({ ...loc, id: genId() })) }]);
                setIsLoggedToBookkeeping(false);
            };
            const removeItem = (itemId) => { 
                if(items.length > 1) setItems(items.filter(item => item.id !== itemId)); 
                setIsLoggedToBookkeeping(false);
            };

            const calc = useMemo(() => {
                let orderGarmentCostTotal = 0, orderGarmentRetailTotal = 0, orderDecoRetailTotal = 0, orderDecoCostTotal = 0;
                let totalDtfCost = 0, totalThreadCost = 0, totalStabilizerCost = 0;
                
                const processedItems = items.map(item => {
                    const sizeSum = SIZES_LIST.reduce((sum, size) => sum + Math.max(0, parseInt(item.sizes?.[size]) || 0), 0);
                    const calculatedQty = sizeSum > 0 ? sizeSum : Math.max(1, parseInt(item.qty) || 1);
                    const rawCost = parseFloat(item.rawCost) || 0;
                    const shipping = parseFloat(item.shippingCost) || 0;
                    const margin = parseFloat(item.margin) || 0;
                    const landedCost = rawCost + shipping;
                    const effectiveMargin = Math.min(margin, 99.9);
                    const clientGarmentPrice = landedCost / (1 - (effectiveMargin / 100));
                    
                    let dtfCount = 0, itemDecoPerPiece = 0, itemDecoCostPerPiece = 0, itemDtfCost = 0, itemThreadCost = 0, itemStabilizerCost = 0;
                    
                    const processedLocations = item.locations.map(loc => {
                        let baseCost = 0, matCost = 0;
                        if (loc.type === 'embroidery') {
                            baseCost = getEmbroideryCostPerPiece(parseInt(loc.stitches) || 0, calculatedQty);
                            if (loc.isPuff) baseCost += parseFloat(loc.puffMarkup) || 0;
                            let stabCost = 1.00;
                            let threadCost = ((parseInt(loc.stitches) || 0) / 2500);
                            matCost = stabCost + threadCost;
                            itemStabilizerCost += stabCost; itemThreadCost += threadCost;
                        } else if (loc.type === 'dtf') {
                            dtfCount++;
                            baseCost = dtfCount === 1 ? (DTF_PRIMARY_FEES[loc.dtfSize] || 0) : (DTF_SECONDARY_FEES[loc.dtfSize] || 0);
                            matCost = DTF_MATERIAL_COSTS[loc.dtfSize] || 0;
                            itemDtfCost += matCost;
                        }
                        let adjustmentCost = parseFloat(loc.adjustment) || 0;
                        let cost = Math.max(0, baseCost + adjustmentCost);
                        let locDiscount = adjustmentCost < 0 ? Math.abs(adjustmentCost) : 0;
                        itemDecoPerPiece += cost; itemDecoCostPerPiece += matCost;
                        return { ...loc, baseCost, cost, materialCost: matCost, locDiscount, isFirstDtf: loc.type === 'dtf' && dtfCount === 1 };
                    });
                    
                    const totalGarmentCost = landedCost * calculatedQty;
                    const totalGarmentRetail = clientGarmentPrice * calculatedQty;
                    const totalDecoRetail = itemDecoPerPiece * calculatedQty;
                    const totalDecoMaterialCost = itemDecoCostPerPiece * calculatedQty;
                    const validPlacementCount = item.locations.filter(l => l.type !== 'none').length;
                    const itemDecoDiscountPerPiece = processedLocations.reduce((sum, l) => sum + l.locDiscount, 0);
                    const itemTotalDecoDiscount = itemDecoDiscountPerPiece * calculatedQty;
                    const lineTotalPerPiece = clientGarmentPrice + itemDecoPerPiece;
                    const lineTotal = lineTotalPerPiece * calculatedQty;
                    const garmentProfit = totalGarmentRetail - totalGarmentCost;
                    const undiscountedLineTotalPerPiece = clientGarmentPrice + itemDecoPerPiece + itemDecoDiscountPerPiece;
                    const undiscountedLineTotal = undiscountedLineTotalPerPiece * calculatedQty;

                    orderGarmentCostTotal += totalGarmentCost; orderGarmentRetailTotal += totalGarmentRetail;
                    orderDecoRetailTotal += totalDecoRetail; orderDecoCostTotal += totalDecoMaterialCost;
                    totalDtfCost += itemDtfCost * calculatedQty; totalThreadCost += itemThreadCost * calculatedQty; totalStabilizerCost += itemStabilizerCost * calculatedQty;

                    return { ...item, calculatedQty, sizeSum, landedCost, clientGarmentPrice, processedLocations, validPlacementCount, itemDecoPerPiece, itemDecoCostPerPiece, itemTotalDecoDiscount, totalGarmentCost, totalGarmentRetail, totalDecoRetail, lineTotalPerPiece, lineTotal, garmentProfit, undiscountedLineTotalPerPiece, undiscountedLineTotal };
                });

                const setup = parseFloat(orderData.setupFees) || 0;
                const digitizing = parseFloat(orderData.digitizingFee) || 0;
                const digitizingCost = parseFloat(orderData.digitizingCost) || 0;
                const discount = parseFloat(orderData.discount) || 0;
                const taxRate = parseFloat(orderData.taxRate) || 0;
                const totalDecoDiscount = processedItems.reduce((sum, item) => sum + item.itemTotalDecoDiscount, 0);
                const totalDiscount = totalDecoDiscount + discount;
                const subtotal = orderGarmentRetailTotal + orderDecoRetailTotal + setup + digitizing;
                const grossSubtotal = subtotal + totalDecoDiscount;
                const discountedSubtotal = Math.max(0, subtotal - discount);
                const tax = discountedSubtotal * (taxRate / 100);
                const grandTotal = discountedSubtotal + tax;
                
                let reservePercent = 5;
                if (orderData.machineReservePercent !== undefined && orderData.machineReservePercent !== '') {
                    reservePercent = parseFloat(orderData.machineReservePercent);
                    if (isNaN(reservePercent)) reservePercent = 0;
                }
                const machineReserve = discountedSubtotal * (reservePercent / 100);
                const totalRestockAndMachineFund = orderDecoCostTotal + machineReserve;
                const totalOrderCost = orderGarmentCostTotal + totalRestockAndMachineFund + digitizingCost;
                const grossProfit = discountedSubtotal - orderGarmentCostTotal;
                const netProfit = grossProfit - orderDecoCostTotal - machineReserve - digitizingCost;
                const totalMarginPercent = discountedSubtotal > 0 ? (netProfit / discountedSubtotal) * 100 : 0;
                const isProfitable = netProfit > 0;
                const deposit = Math.ceil(grandTotal) / 2;
                const actualPaid = orderData.amountPaid !== '' && !isNaN(parseFloat(orderData.amountPaid)) ? parseFloat(orderData.amountPaid) : deposit; 
                const balanceDue = Math.max(0, grandTotal - actualPaid);

                return {
                    items: processedItems, orderGarmentCostTotal, orderGarmentRetailTotal, orderDecoRetailTotal, orderDecoCostTotal,
                    totalDtfCost, totalThreadCost, totalStabilizerCost, setup, digitizing, digitizingCost, discount, reservePercent, machineReserve, subtotal, grossSubtotal, discountedSubtotal, tax, grandTotal,
                    totalRestockAndMachineFund, totalOrderCost, grossProfit, netProfit, totalMarginPercent, isProfitable, totalDiscount, deposit, actualPaid, balanceDue
                };
            }, [items, orderData]);

            const getSizeString = (item) => {
                const activeSizes = SIZES_LIST.filter(s => (parseInt(item.sizes?.[s]) || 0) > 0);
                if (activeSizes.length === 0) return null;
                return activeSizes.map(s => `${s}: ${item.sizes[s]}`).join(', ');
            };

            const handlePrint = (viewType) => {
                if (window.html2pdf) {
                    let elementId = 'proposal-view'; let suffix = 'Proposal';
                    if (viewType === 'internal') { elementId = 'internal-view'; suffix = 'Internal_Breakdown'; } 
                    else if (viewType === 'invoice') { elementId = 'invoice-view'; suffix = 'Final_Invoice'; } 
                    else if (viewType === 'receipt') { elementId = 'receipt-view'; suffix = 'Receipt'; }

                    const element = document.getElementById(elementId);
                    const noPrintElements = element.querySelectorAll('.no-print');
                    noPrintElements.forEach(el => el.style.display = 'none');

                    const dateString = new Date().toLocaleDateString().replace(/\//g, '_');
                    const safeCustomerName = orderData.customerName ? orderData.customerName.replace(/[^a-z0-9]/gi, '_') : 'Customer';
                    const defaultFileName = `${dateString}_${safeCustomerName}_${suffix}.pdf`;
                    let finalFileName = window.prompt("Enter a name to save this PDF:", defaultFileName);
                    
                    if (finalFileName === null) { noPrintElements.forEach(el => el.style.display = ''); return; }
                    if (!finalFileName.toLowerCase().endsWith('.pdf')) finalFileName += '.pdf';
                    
                    const opt = { margin: 0.5, filename: finalFileName, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
                    window.html2pdf().set(opt).from(element).save().then(() => { noPrintElements.forEach(el => el.style.display = ''); });
                } else { window.print(); }
            };

            const fileInputRef = useRef(null);
            const imageInputRef = useRef(null);
            const bookFileInputRef = useRef(null);

            const handleExportQuoter = () => {
                const dateString = new Date().toLocaleDateString().replace(/\//g, '_');
                const safeCustomerName = orderData.customerName ? orderData.customerName.replace(/[^a-z0-9]/gi, '_') : 'Quote';
                let finalFileName = window.prompt("Enter a name to save this quote:", `${dateString}_${safeCustomerName}.json`);
                if (finalFileName === null) return;
                if (!finalFileName.endsWith('.json')) finalFileName += '.json';
                const blob = new Blob([JSON.stringify({ orderData, items }, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = finalFileName; a.click(); URL.revokeObjectURL(url);
            };

            const handleImportQuoter = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const importedData = JSON.parse(ev.target.result);
                        if (importedData.orderData && importedData.items) {
                            setOrderData({ ...orderData, ...importedData.orderData });
                            setItems(importedData.items.map(item => {
                                const fullSizes = generateEmptySizes();
                                if (item.sizes) Object.keys(item.sizes).forEach(k => { if (fullSizes.hasOwnProperty(k)) fullSizes[k] = item.sizes[k]; });
                                return { ...item, sizes: fullSizes };
                            }));
                            setIsLoggedToBookkeeping(false); // reset state on load
                            alert('Quote loaded successfully!');
                        } else alert('Invalid file format.');
                    } catch (err) { alert('Error reading file.'); }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            // --- INTEGRATION: QUOTER TO BOOKKEEPER ---
            const logPaymentToBookkeeping = () => {
                const amountToLog = calc.grandTotal;
                if(amountToLog <= 0) { alert("Order total is 0. Nothing to log."); return; }

                const taxAmount = calc.tax || 0;
                const netAmount = amountToLog - taxAmount;

                const newTx = {
                    id: Date.now(),
                    type: 'income',
                    date: new Date().toISOString().split('T')[0],
                    category: 'Product Sales',
                    amount: amountToLog,
                    tax: taxAmount,
                    shipping: 0,
                    fees: 0,
                    kms: null,
                    netAmount: netAmount,
                    account: accounts[0], // default to first account
                    description: `Full Order Payment: ${orderData.customerName || 'Customer'} - ${orderData.orderName || 'Order'}`
                };

                setTransactions(prev => [newTx, ...prev]);
                setIsLoggedToBookkeeping(true); // Provide visual feedback
            };

            // --- BOOKKEEPING FUNCTIONS ---
            const filteredByYear = useMemo(() => transactions.filter(t => new Date(t.date).getFullYear() === parseInt(selectedYear)), [transactions, selectedYear]);

            const calculateTotals = (data) => {
                // Exclude Loan Principal & Loan Funds Received from Profit/Margin calculations, as they are balance sheet items
                const income = data.filter(t => t.type === 'income' && t.category !== 'Loan / Financing Received').reduce((sum, t) => sum + (parseFloat(t.netAmount) || 0), 0);
                const expenses = data.filter(t => t.type === 'expense' && t.category !== 'Loan Repayment (Principal)').reduce((sum, t) => sum + (parseFloat(t.netAmount) || 0), 0);
                const profit = income - expenses;
                const margin = income > 0 ? (profit / income) * 100 : 0;
                return { income, expenses, profit, margin };
            };

            const fiveYearTotals = useMemo(() => calculateTotals(transactions), [transactions]);
            const annualTotals = useMemo(() => calculateTotals(filteredByYear), [filteredByYear]);

            const getChartData = (data, type) => {
                const breakdown = {};
                data.filter(t => t.type === type).forEach(t => { breakdown[t.category] = (breakdown[t.category] || 0) + (parseFloat(t.netAmount) || 0); });
                return Object.keys(breakdown).map(name => ({ name, value: breakdown[name] }));
            };

            const chartDataSrc = dashView === 'annual' ? filteredByYear : transactions;
            const incomeChartData = useMemo(() => getChartData(chartDataSrc, 'income'), [chartDataSrc]);
            const expenseChartData = useMemo(() => getChartData(chartDataSrc, 'expense'), [chartDataSrc]);

            const currentLedgerType = bookTab === 'expenses' ? 'expense' : 'income';
            const filteredLedgerTransactions = useMemo(() => transactions.filter(t => t.type === currentLedgerType), [transactions, currentLedgerType]);
            const currentLedgerTotal = useMemo(() => filteredLedgerTransactions.reduce((sum, t) => sum + (parseFloat(t.netAmount) || 0), 0), [filteredLedgerTransactions]);

            const addBookTransaction = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const amount = parseFloat(formData.get('amount')) || 0;
                const tax = parseFloat(formData.get('tax')) || 0;
                const shipping = parseFloat(formData.get('shipping')) || 0;
                const fees = parseFloat(formData.get('fees')) || 0;
                
                const kmsRaw = formData.get('kms');
                const kms = kmsRaw ? parseFloat(kmsRaw) : null;
                
                const netAmount = amount - tax - shipping - fees;

                const newTx = {
                    id: Date.now(),
                    type: formData.get('type'),
                    date: formData.get('date'),
                    category: formData.get('category'),
                    amount, tax, shipping, fees, netAmount, kms,
                    account: formData.get('account'),
                    description: formData.get('description')
                };
                setTransactions([newTx, ...transactions]);
                e.target.reset();
            };

            const handleQuickSubmit = (e, actionType) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                
                let type, category, amount, tax, shipping, fees, kms, netAmount;
                const date = formData.get('date');
                const account = formData.get('account') || accounts[0];
                const description = formData.get('description');
                
                if (actionType === 'loan') {
                    const lType = formData.get('loanType'); // 'repayment' or 'received'
                    
                    if (lType === 'repayment') {
                        const totalAmount = parseFloat(formData.get('amount')) || 0;
                        const interestAmount = parseFloat(formData.get('interest')) || 0;
                        const principalAmount = totalAmount - interestAmount;

                        const newTxs = [];
                        const baseId = Date.now();

                        if (principalAmount > 0) {
                            newTxs.push({
                                id: baseId, type: 'expense', date,
                                category: 'Loan Repayment (Principal)',
                                amount: principalAmount, tax: 0, shipping: 0, fees: 0, netAmount: principalAmount, kms: null,
                                account, description: description ? `${description} (Principal)` : 'Loan Principal Repayment'
                            });
                        }
                        if (interestAmount > 0) {
                            newTxs.push({
                                id: baseId + 1, type: 'expense', date,
                                category: 'Loan Interest (Tax Deductible)',
                                amount: interestAmount, tax: 0, shipping: 0, fees: 0, netAmount: interestAmount, kms: null,
                                account, description: description ? `${description} (Interest)` : 'Loan Interest Payment'
                            });
                        }
                        
                        setTransactions([...newTxs, ...transactions]);
                        setQuickAction(null);
                        setLoanActionType('repayment'); // reset
                        return; // Skip normal single-push below
                    } else {
                        // received loan
                        type = 'income'; category = 'Loan / Financing Received';
                        amount = parseFloat(formData.get('amount')) || 0;
                        tax = 0; shipping = 0; fees = 0; kms = null; netAmount = amount;
                    }
                } else if (actionType === 'drive') {
                    type = 'expense'; category = 'Vehicle / Mileage';
                    amount = 0; tax = 0; shipping = 0; fees = 0;
                    kms = parseFloat(formData.get('kms')) || 0;
                    netAmount = 0;
                } else if (actionType === 'expense') {
                    type = 'expense'; category = formData.get('category');
                    amount = parseFloat(formData.get('amount')) || 0;
                    tax = parseFloat(formData.get('tax')) || 0;
                    shipping = 0; fees = 0; kms = null;
                    netAmount = amount - tax; 
                } else {
                    // Sale
                    type = 'income'; category = formData.get('category');
                    amount = parseFloat(formData.get('amount')) || 0;
                    tax = parseFloat(formData.get('tax')) || 0;
                    shipping = parseFloat(formData.get('shipping')) || 0;
                    fees = parseFloat(formData.get('fees')) || 0;
                    kms = null;
                    netAmount = amount - tax - shipping - fees;
                }

                const newTx = {
                    id: Date.now(), type, date, category,
                    amount, tax, shipping, fees, netAmount, kms,
                    account, description
                };

                setTransactions([newTx, ...transactions]);
                setQuickAction(null); // Go back to splash screen
            };

            const confirmDelete = () => {
                setTransactions(transactions.filter(t => t.id !== itemToDelete));
                setItemToDelete(null);
            };

            // Setup Tab Handlers
            const handleAddListValue = (listType) => {
                if (listType === 'account' && newAccount.trim() && !accounts.includes(newAccount.trim())) {
                    setAccounts([...accounts, newAccount.trim()]);
                    setNewAccount('');
                } else if (listType === 'income' && newIncCat.trim() && !categories.income.includes(newIncCat.trim())) {
                    setCategories({...categories, income: [...categories.income, newIncCat.trim()]});
                    setNewIncCat('');
                } else if (listType === 'expense' && newExpCat.trim() && !categories.expense.includes(newExpCat.trim())) {
                    setCategories({...categories, expense: [...categories.expense, newExpCat.trim()]});
                    setNewExpCat('');
                }
            };

            const handleRemoveListValue = (listType, value) => {
                if (listType === 'account') setAccounts(accounts.filter(a => a !== value));
                else if (listType === 'income') setCategories({...categories, income: categories.income.filter(c => c !== value)});
                else if (listType === 'expense') setCategories({...categories, expense: categories.expense.filter(c => c !== value)});
            };

            // Export Data Bundle
            const exportBookData = () => {
                const backupBundle = { transactions, accounts, categories };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupBundle));
                const a = document.createElement('a'); a.href = dataStr; a.download = `bookkeeping_backup_${new Date().toISOString().split('T')[0]}.json`; a.click();
            };

            const handleImportBookkeeping = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (Array.isArray(data)) {
                            setTransactions(data); // Legacy support
                            alert("Transactions Restored successfully.");
                        } else if (data.transactions) {
                            setTransactions(data.transactions);
                            if (data.accounts) setAccounts(data.accounts);
                            if (data.categories) setCategories(data.categories);
                            alert("Full Backup Restored successfully.");
                        } else {
                            alert("The selected file is not a valid backup.");
                        }
                    } catch (err) {
                        alert("Could not read the JSON file.");
                    }
                    event.target.value = null;
                };
                reader.readAsText(file);

                                <h4 className="text-[10px] font-black uppercase text-rose-500 tracking-[0.2em] flex items-center gap-2"><Icon name="trendingDown" size={14}/> Expense Categories</h4>
                                <div className="flex gap-2">
                                    <input value={newExpCat} onChange={e => setNewExpCat(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAddListValue('expense')} placeholder="Add category..." className="flex-1 p-2 soft-input rounded-lg text-sm" />
                                    <button onClick={() => handleAddListValue('expense')} className="px-4 py-2 bg-rose-500 text-white rounded-lg text-sm font-bold hover:bg-rose-600 transition-colors">Add</button>
                                </div>
                                <div className="space-y-2 max-h-[250px] overflow-y-auto pr-2">
                                    {categories.expense.map(cat => (
                                        <div key={cat} className="flex items-center justify-between p-3 bg-white rounded-lg border border-slate-100 text-sm font-medium shadow-sm">
                                            <span className="truncate mr-2">{cat}</span>
                                            <button onClick={() => handleRemoveListValue('expense', cat)} className="text-slate-300 hover:text-red-500 transition-colors p-1"><Icon name="trash" size={16}/></button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        {/* Extended Beginners Guide */}
                        <section className="space-y-4 mt-8 md:mt-12 pt-6 border-t border-slate-100">
                            <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-4">Beginner's Guide to Bookkeeping</h4>
                            <div className="bg-slate-50 border border-slate-200 p-6 md:p-8 rounded-2xl space-y-6 md:space-y-8">
                                <div className="flex flex-col sm:flex-row items-start gap-4 sm:gap-6">
                                    <div className="p-3 bg-emerald-100 text-emerald-600 rounded-xl shrink-0"><Icon name="bookOpen" size={24} /></div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 text-sm">1. What is Gross Amount vs. Net Amount?</h5>
                                        <p className="text-sm text-slate-600 mt-2 leading-relaxed">When you make a sale (Income), you might charge a customer $100 <strong>(Amount)</strong>. However, you might collect $5 in <strong>Tax</strong>, pay $10 for <strong>Shipping</strong>, and lose $3 to a credit card <strong>Fee</strong>. The system automatically subtracts those from the total to give you the <strong>Net Amount ($82)</strong>. This Net Amount is the *actual* money your business earned.</p>
                                    </div>
                                </div>
                                <div className="flex flex-col sm:flex-row items-start gap-4 sm:gap-6">
                                    <div className="p-3 bg-rose-100 text-rose-600 rounded-xl shrink-0"><Icon name="trendingDown" size={24} /></div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 text-sm">2. Tracking Your Expenses</h5>
                                        <p className="text-sm text-slate-600 mt-2 leading-relaxed">Go to the "Expenses" tab to log everything you spend money on for the business. This could be software subscriptions, shipping boxes, or advertising. Tracking this accurately is vital because it lowers your taxable income at the end of the year!</p>
                                    </div>
                                </div>
                                <div className="flex flex-col sm:flex-row items-start gap-4 sm:gap-6">
                                    <div className="p-3 bg-purple-100 text-purple-600 rounded-xl shrink-0"><Icon name="landmark" size={24} /></div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 text-sm">3. How do Loans work?</h5>
                                        <p className="text-sm text-slate-600 mt-2 leading-relaxed">When you repay a loan, only the <strong>Interest</strong> is tax-deductible (not the Principal). Our "Manage Loans" quick entry automatically splits your payment into two separate transactions in your ledger. This ensures your accountant sees exactly what can be written off at tax time! (Note: Loan principal does not affect your Profit dashboard since it is a balance sheet item, not an expense).</p>
                                    </div>
                                </div>
                                <div className="flex flex-col sm:flex-row items-start gap-4 sm:gap-6">
                                    <div className="p-3 bg-indigo-100 text-indigo-600 rounded-xl shrink-0"><Icon name="fileSpreadsheet" size={24} /></div>
                                    <div>
                                        <h5 className="font-bold text-slate-800 text-sm">4. Sending Data to an Accountant</h5>
                                        <p className="text-sm text-slate-600 mt-2 leading-relaxed">Come tax time, simply click the solid blue <strong>"Export Excel"</strong> button on the top right. This generates a perfectly formatted `.csv` file containing every transaction you logged, which any accountant, CPA, or software (like Excel or Google Sheets) can open instantly.</p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-content flex flex-col relative">
                    {/* Item Deletion Modal */}
                    {itemToDelete && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-2xl max-w-sm w-full shadow-2xl border border-slate-100">
                                <div className="w-12 h-12 rounded-full bg-rose-100 text-rose-500 flex items-center justify-center mb-4">
                                    <Icon name="trash" size={24} />
                                </div>
                                <h3 className="text-lg font-bold text-slate-800 mb-2">Delete Transaction?</h3>
                                <p className="text-sm text-slate-500 mb-8">Are you sure you want to delete this record? This action cannot be undone and will affect your dashboard totals.</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setItemToDelete(null)} className="px-5 py-2.5 text-slate-600 hover:bg-slate-100 rounded-xl text-sm font-bold transition-all">Cancel</button>
                                    <button onClick={confirmDelete} className="px-5 py-2.5 bg-rose-500 text-white hover:bg-rose-600 rounded-xl shadow-md text-sm font-bold transition-all">Yes, Delete</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Top Sticky Header */}
                    <div className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30 pt-safe no-print">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 p-4">
                            <div>
                                <h1 className="text-2xl font-black flex items-center gap-2 tracking-tight text-slate-800">
                                    <Icon name="layers" size={28} className="text-indigo-600"/>
                                    HQB Pro
                                </h1>
                            </div>

                            {/* Module Switcher */}
                            <div className="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                                <button 
                                    onClick={() => setAppModule('quoter')} 
                                    className={`flex items-center gap-2 px-6 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'quoter' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    <Icon name="calculator" size={18} /> Quoter
                                </button>
                                <button 
                                    onClick={() => { setAppModule('bookkeeping'); if(bookTab === 'dashboard') setBookTab('quick'); }} 
                                    className={`flex items-center gap-2 px-6 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'bookkeeping' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    <Icon name="wallet" size={18} /> Bookkeeping
                                </button>
                            </div>

                            {appModule === 'quoter' && (
                                <div className="hidden lg:flex items-center gap-8">
                                    <div className="text-right">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Est. Profit ({calc.totalMarginPercent.toFixed(1)}%)</p>
                                        <p className="font-black text-2xl leading-none text-emerald-600">{formatCurrency(calc.netProfit)}</p>
                                    </div>
                                    <div className="text-right border-l border-slate-200 pl-8">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Total Quote</p>
                                        <p className="font-black text-2xl leading-none text-indigo-700">{formatCurrency(calc.grandTotal)}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="p-4 md:p-6 max-w-4xl w-full mx-auto flex-1">
                        {appModule === 'quoter' ? (
                            <div className="slide-fade-enter-active">
                                {quoterTab === 'build' && renderQuoterBuild()}
                                {quoterTab === 'internal' && renderQuoterInternal()}
                                {quoterTab === 'proposal' && renderQuoterDoc('proposal')}
                                {quoterTab === 'invoice' && renderQuoterDoc('invoice')}
                                {quoterTab === 'receipt' && renderQuoterDoc('receipt')}
                            </div>
                        ) : (
                            <div className="slide-fade-enter-active">
                                {bookTab === 'dashboard' && renderBookDashboard()}
                                {bookTab === 'quick' && renderBookQuickEntry()}
                                {bookTab === 'income' && renderBookLedger()}
                                {bookTab === 'expenses' && renderBookLedger()}
                                {bookTab === 'setup' && renderBookSetup()}
                            </div>
                        )}
                    </div>

                    {/* Dynamic Bottom Navigation */}
                    <div className="fixed bottom-0 w-full bg-white border-t border-slate-200 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)] z-30 no-print pb-safe">
                        <div className="max-w-4xl mx-auto flex h-16 md:h-20">
                            {appModule === 'quoter' ? (
                                <>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider transition-colors ${quoterTab === 'build' ? 'text-indigo-700 bg-indigo-50/80 border-t-2 border-indigo-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('build')}><Icon name="calculator" size={22} /> Builder</button>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${quoterTab === 'internal' ? 'text-emerald-700 bg-emerald-50/80 border-t-2 border-emerald-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('internal')}><Icon name="eye" size={22} /> Internal</button>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${quoterTab === 'proposal' ? 'text-indigo-700 bg-indigo-50/80 border-t-2 border-indigo-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('proposal')}><Icon name="fileText" size={22} /> Proposal</button>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${quoterTab === 'invoice' ? 'text-indigo-700 bg-indigo-50/80 border-t-2 border-indigo-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('invoice')}><Icon name="receipt" size={22} /> Invoice</button>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${quoterTab === 'receipt' ? 'text-emerald-700 bg-emerald-50/80 border-t-2 border-emerald-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('receipt')}><Icon name="fileCheck" size={22} /> Receipt</button>
                                </>
                            ) : (
                                <>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider transition-colors ${bookTab === 'dashboard' ? 'text-indigo-700 bg-indigo-50/80 border-t-2 border-indigo-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => { setBookTab('dashboard'); setQuickAction(null); }}><Icon name="layoutDashboard" size={22} /> Dashboard</button>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${bookTab === 'quick' ? 'text-emerald-700 bg-emerald-50/80 border-t-2 border-emerald-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => { setBookTab('quick'); setQuickAction(null); }}><Icon name="zap" size={22} /> Quick Log</button>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${bookTab === 'income' ? 'text-emerald-700 bg-emerald-50/80 border-t-2 border-emerald-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => { setBookTab('income'); setQuickAction(null); }}><Icon name="trendingUp" size={22} /> Income</button>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${bookTab === 'expenses' ? 'text-rose-700 bg-rose-50/80 border-t-2 border-rose-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => { setBookTab('expenses'); setQuickAction(null); }}><Icon name="trendingDown" size={22} /> Expenses</button>
                                    <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${bookTab === 'setup' ? 'text-indigo-700 bg-indigo-50/80 border-t-2 border-indigo-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => { setBookTab('setup'); setQuickAction(null); }}><Icon name="settings" size={22} /> Setup</button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
