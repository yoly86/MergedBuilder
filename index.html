<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop OS V2</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Mobile Optimizations */
        input, select, textarea { font-size: 16px !important; }
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 80px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-slate-900 antialiased selection:bg-indigo-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                calculator: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
                layers: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
                pieChart: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>,
                check: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
                bell: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
            };
            return icons[name] || null;
        };
// --- QUOTER CONSTANTS ---
        const STITCH_MATRIX = [
            { maxStitch: 8000, prices: [15, 15, 14.5, 14.5, 14] },
            { maxStitch: 15000, prices: [22.5, 22, 21, 21, 20] },
            { maxStitch: 20000, prices: [30, 28, 27, 27, 25] },
            { maxStitch: Infinity, prices: [50, 45, 43, 43, 40] }
        ];
        const QTY_TIERS = [{ max: 10, index: 0 }, { max: 49, index: 1 }, { max: 100, index: 2 }, { max: 299, index: 3 }, { max: Infinity, index: 4 }];
        
        const getEmbroideryCost = (stitches, qty) => {
            if (!stitches || stitches <= 0) return 0;
            const sRow = STITCH_MATRIX.find(r => stitches <= r.maxStitch) || STITCH_MATRIX[STITCH_MATRIX.length - 1];
            const qCol = QTY_TIERS.find(q => qty <= q.max) || QTY_TIERS[QTY_TIERS.length - 1];
            return sRow.prices[qCol.index];
        };

        const DTF_FEES = { small: 11.33, medium: 16.00, large: 22.00 }; // Simplified for mobile view

        // --- QUOTER COMPONENT ---
        const QuoterModule = ({ onPushToPipeline }) => {
            const [customer, setCustomer] = useState('');
            const [desc, setDesc] = useState('');
            const [qty, setQty] = useState(1);
            const [blankCost, setBlankCost] = useState(0);
            const [decoType, setDecoType] = useState('dtf'); // 'dtf' or 'embroidery'
            const [decoSize, setDecoSize] = useState('small');
            const [stitches, setStitches] = useState(10000);
            const [margin, setMargin] = useState(35);

            // Calculate Totals
            const landedCost = parseFloat(blankCost) || 0;
            const clientGarmentPrice = landedCost / (1 - ((parseFloat(margin) || 0) / 100));
            
            let decoCost = 0;
            if (decoType === 'dtf') decoCost = DTF_FEES[decoSize] || 0;
            if (decoType === 'embroidery') decoCost = getEmbroideryCost(parseFloat(stitches), parseFloat(qty));

            const pricePerPiece = clientGarmentPrice + decoCost;
            const totalQuote = pricePerPiece * (parseFloat(qty) || 1);

            const handleSend = () => {
                if(!customer) return alert("Please enter a customer name.");
                onPushToPipeline({
                    id: `JOB-${Date.now().toString().slice(-6)}`,
                    customer: customer,
                    desc: `${qty}x ${desc || 'Custom Items'}`,
                    stage: 'new',
                    balance: totalQuote / 2, // Assuming 50% deposit paid, 50% owed
                    total: totalQuote
                });
                // Reset form
                setCustomer(''); setDesc(''); setQty(1); setBlankCost(0);
            };

            return (
                <div className="space-y-6 pb-6">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                        <h2 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <Icon name="calculator" size={18} className="text-indigo-600" /> Quick Quote
                        </h2>
                        
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1">Customer / Project</label>
                                <input type="text" placeholder="e.g., Local Hockey Team" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={customer} onChange={e => setCustomer(e.target.value)} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Item Desc</label>
                                    <input type="text" placeholder="e.g., Black Hoodies" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={desc} onChange={e => setDesc(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Total Qty</label>
                                    <input type="number" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold" value={qty} onChange={e => setQty(e.target.value)} />
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4 pt-2 border-t border-slate-100">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Blank Cost ($)</label>
                                    <input type="number" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={blankCost} onChange={e => setBlankCost(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1">Margin (%)</label>
                                    <input type="number" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-indigo-700 font-bold" value={margin} onChange={e => setMargin(e.target.value)} />
                                </div>
                            </div>

                            <div className="pt-2 border-t border-slate-100">
                                <label className="block text-xs font-bold text-slate-500 mb-2">Decoration Type</label>
                                <div className="flex gap-2 mb-3">
                                    <button onClick={() => setDecoType('dtf')} className={`flex-1 py-2 rounded-lg text-xs font-bold border ${decoType === 'dtf' ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-slate-200 text-slate-500'}`}>DTF Print</button>
                                    <button onClick={() => setDecoType('embroidery')} className={`flex-1 py-2 rounded-lg text-xs font-bold border ${decoType === 'embroidery' ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-slate-200 text-slate-500'}`}>Embroidery</button>
                                </div>

                                {decoType === 'dtf' ? (
                                    <select className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={decoSize} onChange={e => setDecoSize(e.target.value)}>
                                        <option value="small">Small / Left Chest</option>
                                        <option value="medium">Medium / Youth</option>
                                        <option value="large">Large / Full Back</option>
                                    </select>
                                ) : (
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Estimated Stitches</label>
                                        <input type="number" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={stitches} onChange={e => setStitches(e.target.value)} />
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Live Total Readout */}
                    <div className="bg-slate-900 text-white p-5 rounded-2xl shadow-md">
                        <div className="flex justify-between items-center mb-2">
                            <span className="text-slate-400 text-xs font-bold uppercase tracking-widest">Price Per Item</span>
                            <span className="text-lg font-bold">${pricePerPiece.toFixed(2)}</span>
                        </div>
                        <div className="flex justify-between items-center pt-2 border-t border-slate-700">
                            <span className="text-slate-300 text-sm font-black uppercase tracking-widest">Total Quote</span>
                            <span className="text-3xl font-black text-emerald-400">${totalQuote.toFixed(2)}</span>
                        </div>
                        <button onClick={handleSend} className="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all">
                            Collect Deposit & Send to Pipeline
                        </button>
                    </div>
                </div>
            );
        };
        // --- LEDGER COMPONENT ---
        const LedgerModule = ({ transactions, onAddTransaction }) => {
            const CATEGORIES = [
                'Income: Product Sales', 'Expense: Blanks/Inventory', 'Expense: Consumables (Thread/DTF)', 
                'Expense: Spoilage (Machine Error)', 'Expense: Repairs/Maintenance', 
                'Expense: Vehicle/Fuel', 'Expense: Software/Subscribers', 'Expense: Shipping/Postage'
            ];

            const [amount, setAmount] = useState('');
            const [cat, setCat] = useState(CATEGORIES[0]);
            const [note, setNote] = useState('');

            const totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const totalExpense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);

            return (
                <div className="space-y-6 pb-6">
                    {/* KPI Dashboard */}
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Income</span>
                            <p className="text-xl font-black text-emerald-600 mt-1">${totalIncome.toFixed(2)}</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Net Profit</span>
                            <p className="text-xl font-black text-indigo-600 mt-1">${(totalIncome - totalExpense).toFixed(2)}</p>
                        </div>
                    </div>

                    {/* Quick Entry */}
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                        <h2 className="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <Icon name="pieChart" size={18} className="text-indigo-600" /> Log Expense / Income
                        </h2>
                        <div className="space-y-4">
                            <input type="number" placeholder="Amount ($)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold" value={amount} onChange={e => setAmount(e.target.value)} />
                            <select className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={cat} onChange={e => setCat(e.target.value)}>
                                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <input type="text" placeholder="Note (e.g. Thread restock)" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm" value={note} onChange={e => setNote(e.target.value)} />
                            <button onClick={() => {
                                onAddTransaction({ 
                                    id: Date.now(), 
                                    amount: parseFloat(amount), 
                                    category: cat, 
                                    note: note, 
                                    type: cat.startsWith('Income') ? 'income' : 'expense',
                                    date: new Date().toLocaleDateString()
                                });
                                setAmount(''); setNote('');
                            }} className="w-full bg-slate-900 text-white py-3 rounded-xl font-bold active:scale-95 transition-all">Save Record</button>
                        </div>
                    </div>

                    {/* Recent Ledger */}
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="p-4 border-b border-slate-100 bg-slate-50 font-bold text-xs text-slate-500 uppercase tracking-widest">Recent Transactions</div>
                        <div className="divide-y divide-slate-100">
                            {transactions.map(t => (
                                <div key={t.id} className="p-4 flex justify-between items-center">
                                    <div>
                                        <p className="text-sm font-bold text-slate-800">{t.category.split(': ')[1]}</p>
                                        <p className="text-[10px] text-slate-400 font-medium">{t.date} {t.note && `• ${t.note}`}</p>
                                    </div>
                                    <span className={`font-black text-sm ${t.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>
                                        {t.type === 'income' ? '+' : '-'}${t.amount.toFixed(2)}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };
        function App() {
            const [activeTab, setActiveTab] = useState('pipeline');

            // Sample Data to show off the UI
            const [orders, setOrders] = useState([
                { id: 'JOB-1042', customer: 'Local Hockey Team', desc: '30x Hoodies (Front Logo)', stage: 'printing', balance: 0, total: 1250 },
                { id: 'JOB-1043', customer: 'WKND UNFRM Drop', desc: '50x Puff Hats', stage: 'prepping', balance: 0, total: 850 },
                { id: 'JOB-1044', customer: 'City Council', desc: '15x Polos (Left Chest)', stage: 'receiving', balance: 350, total: 700 },
                { id: 'JOB-1045', customer: 'Coffee Shop', desc: '20x Aprons', stage: 'pickup', balance: 200, total: 400 },
            ]);

            const STAGES = [
                { id: 'new', label: 'New / Paid', color: 'bg-slate-100 text-slate-700' },
                { id: 'ordering', label: 'Ordering Blanks', color: 'bg-amber-100 text-amber-800' },
                { id: 'receiving', label: 'Receiving Blanks', color: 'bg-orange-100 text-orange-800' },
                { id: 'prepping', label: 'Prepping / DTF', color: 'bg-indigo-100 text-indigo-800' },
                { id: 'printing', label: 'Embroidery / Print', color: 'bg-blue-100 text-blue-800' },
                { id: 'pickup', label: 'Ready for Pickup', color: 'bg-emerald-100 text-emerald-800' }
            ];

            const moveOrder = (id, newStage) => {
                setOrders(orders.map(o => o.id === id ? { ...o, stage: newStage } : o));
            };

            const renderPipeline = () => (
                <div className="space-y-6">
                    <div className="flex overflow-x-auto hide-scrollbar gap-3 pb-2 -mx-4 px-4 snap-x">
                        {STAGES.map(stage => {
                            const stageOrders = orders.filter(o => o.stage === stage.id);
                            return (
                                <div key={stage.id} className="min-w-[280px] w-80 flex-shrink-0 snap-center bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col max-h-[70vh]">
                                    <div className={`p-4 border-b border-slate-100 rounded-t-2xl font-bold text-sm flex justify-between items-center ${stage.color}`}>
                                        {stage.label}
                                        <span className="bg-white/50 px-2 py-0.5 rounded-full text-xs">{stageOrders.length}</span>
                                    </div>
                                    <div className="p-3 overflow-y-auto space-y-3 flex-1 bg-slate-50/50 rounded-b-2xl">
                                        {stageOrders.length === 0 ? (
                                            <p className="text-xs text-slate-400 text-center py-6 font-medium">No orders in this stage.</p>
                                        ) : (
                                            stageOrders.map(order => (
                                                <div key={order.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 relative group">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="text-[10px] font-black text-slate-400">{order.id}</span>
                                                        {order.balance > 0 ? (
                                                            <span className="text-[10px] font-bold bg-rose-50 text-rose-600 px-2 py-1 rounded-md border border-rose-100">Owes ${order.balance}</span>
                                                        ) : (
                                                            <span className="text-[10px] font-bold bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md border border-emerald-100 flex items-center gap-1"><Icon name="check" size={10}/> Paid</span>
                                                        )}
                                                    </div>
                                                    <h4 className="font-bold text-slate-800 text-sm">{order.customer}</h4>
                                                    <p className="text-xs text-slate-500 mt-1 mb-4">{order.desc}</p>
                                                    
                                                    {stage.id === 'pickup' && order.balance > 0 && (
                                                        <button className="w-full mb-3 bg-indigo-50 text-indigo-700 py-2 rounded-lg text-xs font-bold border border-indigo-100 flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                                            <Icon name="bell" size={14} /> Notify to Pay
                                                        </button>
                                                    )}

                                                    <select 
                                                        value={order.stage} 
                                                        onChange={(e) => moveOrder(order.id, e.target.value)}
                                                        className="w-full bg-slate-50 border border-slate-200 text-xs text-slate-600 p-2 rounded-lg font-semibold focus:ring-2 focus:ring-indigo-500 outline-none"
                                                    >
                                                        {STAGES.map(s => <option key={s.id} value={s.id}>Move to: {s.label}</option>)}
                                                    </select>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-safe flex flex-col">
                    {/* Header */}
                    <div className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-black tracking-tight text-slate-800 flex items-center gap-2">
                                <div className="bg-indigo-600 text-white p-1.5 rounded-lg"><Icon name="layers" size={20} /></div>
                                Triple One OS
                            </h1>
                            <div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 font-bold border border-slate-200">G</div>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 max-w-7xl w-full mx-auto p-4">
                        {activeTab === 'pipeline' && renderPipeline()}
                        {activeTab === 'quoter' && <QuoterModule onPushToPipeline={(newOrder) => {
    setOrders([newOrder, ...orders]);
    setActiveTab('pipeline'); // Auto-switch to pipeline to see it
}} />}
                        {activeTab === 'ledger' && (
    <LedgerModule 
        transactions={transactions} 
        onAddTransaction={(tx) => setTransactions([tx, ...transactions])} 
    />
)}
                    </div>

                    {/* Mobile-First Bottom Nav */}
                    <div className="fixed bottom-0 w-full bg-white border-t border-slate-200 pb-[env(safe-area-inset-bottom)] z-40 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)]">
                        <div className="flex justify-around max-w-md mx-auto">
                            <button onClick={() => setActiveTab('quoter')} className={`flex flex-col items-center p-4 w-full transition-colors ${activeTab === 'quoter' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <Icon name="calculator" size={24} />
                                <span className="text-[10px] font-bold mt-1 uppercase tracking-wider">Quoter</span>
                            </button>
                            <button onClick={() => setActiveTab('pipeline')} className={`flex flex-col items-center p-4 w-full transition-colors ${activeTab === 'pipeline' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <Icon name="layers" size={24} />
                                <span className="text-[10px] font-bold mt-1 uppercase tracking-wider">Pipeline</span>
                            </button>
                            <button onClick={() => setActiveTab('ledger')} className={`flex flex-col items-center p-4 w-full transition-colors ${activeTab === 'ledger' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <Icon name="pieChart" size={24} />
                                <span className="text-[10px] font-bold mt-1 uppercase tracking-wider">Ledger</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
