<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid Quoter & Bookkeeper Pro</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        input[type="text"], input[type="number"], input[type="date"], select, textarea { font-size: 16px !important; }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .pb-content { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 90px); }
        
        @media print {
            @page { margin: 0; }
            body { background-color: white !important; margin: 1cm !important; }
            .no-print { display: none !important; }
            .print-full-width { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .print-no-shadow { box-shadow: none !important; border: none !important; }
            .page-container { background: transparent !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .page-container { background: white; max-width: 8.5in; margin: 0 auto; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border-radius: 0.75rem; }
        .soft-input { background-color: #f8fafc; border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .soft-input:focus { background-color: #ffffff; border-color: #818cf8; box-shadow: 0 0 0 3px #e0e7ff; outline: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900 selection:bg-indigo-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                calculator: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
                printer: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
                user: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                shirt: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>,
                fileText: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>,
                receipt: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17V7"/></svg>,
                fileCheck: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m9 15 2 2 4-4"/></svg>,
                layers: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
                plus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                eye: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
                download: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                save: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
                upload: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
                image: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
                copy: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
                chevronDown: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>,
                chevronUp: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 15 12 9 6 15"></polyline></svg>,
                checkCircle: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
                layoutDashboard: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
                trendingUp: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
                trendingDown: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>,
                wallet: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
                check: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>
            };
            return icons[name] || null;
        };

        // --- PIPELINE STAGES ---
        const STAGES = [
            { id: 'quote', label: '1. Quote Issued', color: 'bg-slate-200 text-slate-800' },
            { id: 'new', label: '2. Deposit Paid', color: 'bg-sky-100 text-sky-800' },
            { id: 'ordering', label: '3. Ordering Blanks', color: 'bg-amber-100 text-amber-800' },
            { id: 'receiving', label: '4. Receiving Blanks', color: 'bg-orange-100 text-orange-800' },
            { id: 'prepping', label: '5. Prepping / DTF', color: 'bg-indigo-100 text-indigo-800' },
            { id: 'printing', label: '6. Emb / Print', color: 'bg-blue-100 text-blue-800' },
            { id: 'pickup', label: '7. Ready for Pickup', color: 'bg-emerald-100 text-emerald-800' }
        ];

        // --- QUOTER CONSTANTS ---
        const STITCH_MATRIX = [
            { maxStitch: 8000, prices: [15, 15, 14.5, 14.5, 14] },
            { maxStitch: 15000, prices: [22.5, 22, 21, 21, 20] },
            { maxStitch: 20000, prices: [30, 28, 27, 27, 25] },
            { maxStitch: Infinity, prices: [50, 45, 43, 43, 40] }
        ];
        const QTY_TIERS = [{ max: 10, index: 0 }, { max: 49, index: 1 }, { max: 100, index: 2 }, { max: 299, index: 3 }, { max: Infinity, index: 4 }];
        const getEmbroideryCostPerPiece = (stitches, qty) => {
            if (!stitches || stitches <= 0) return 0;
            const sRow = STITCH_MATRIX.find(r => stitches <= r.maxStitch) || STITCH_MATRIX[STITCH_MATRIX.length - 1];
            const qCol = QTY_TIERS.find(q => qty <= q.max) || QTY_TIERS[QTY_TIERS.length - 1];
            return sRow.prices[qCol.index];
        };

        const DTF_SIZES = [
            { id: 'xs', label: 'Extra Small / Hat (2.5"x2.5")' }, { id: 'small', label: 'Small / Left Chest (4"x4")' }, { id: 'medium', label: 'Mid-size / Youth (8"x8")' },
            { id: 'sleeve', label: 'Sleeve / Long Strip' }, { id: 'large', label: 'Standard Full Back (11"x11")' }, { id: 'xlarge', label: 'Oversized (13"x16")' }, { id: 'jumbo', label: 'Jumbo (16"x20")' }
        ];
        const PLACEMENTS = [
            { id: 'custom', label: 'Custom / Other' }, { id: 'fc', label: 'Front - Center Chest' }, { id: 'lc', label: 'Front - Left Chest' }, { id: 'rc', label: 'Front - Right Chest' },
            { id: 'bc', label: 'Back - Center' }, { id: 'sleeve_l', label: 'Left Sleeve' }, { id: 'sleeve_r', label: 'Right Sleeve' }, { id: 'hat_front', label: 'Hat - Front Center' },
            { id: 'hat_left', label: 'Hat - Left Panel' }, { id: 'hat_right', label: 'Hat - Right Panel' }, { id: 'hat_back', label: 'Hat - Back Arch' }
        ];
        const SIZES_LIST = ['XS', 'S', 'M', 'L', 'XL', '2X', '3X', '4X', '5X'];
        const DTF_PRIMARY_FEES = { xs: 8.00, small: 11.33, medium: 16.00, sleeve: 19.50, large: 22.00, xlarge: 28.00, jumbo: 35.00 };
        const DTF_SECONDARY_FEES = { xs: 3.50, small: 4.50, medium: 8.00, sleeve: 10.50, large: 12.00, xlarge: 15.00, jumbo: 20.00 };
        const DTF_MATERIAL_COSTS = { xs: 0.35, small: 0.67, medium: 2.67, sleeve: 1.75, large: 5.04, xlarge: 8.67, jumbo: 12.50 };

        const genId = () => Math.random().toString(36).substr(2, 9);
        const formatCurrency = (val) => '$' + (val || 0).toFixed(2);
        const generateEmptySizes = () => SIZES_LIST.reduce((acc, size) => { acc[size] = ''; return acc; }, {});

        // --- MAIN APP COMPONENT ---
        function App() {
            const [appModule, setAppModule] = useState('pipeline'); 
            const [quoterTab, setQuoterTab] = useState('build');
            const [bookTab, setBookTab] = useState('dashboard');
            
            const receiptRef = useRef(null);
            const [receiptData, setReceiptData] = useState(null);

            // Safe Local Storage Persistence
            const [orders, setOrders] = useState(() => {
                try {
                    const saved = localStorage.getItem('t1_orders');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });
            const [transactions, setTransactions] = useState(() => {
                try {
                    const saved = localStorage.getItem('t1_ledger');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            useEffect(() => { localStorage.setItem('t1_orders', JSON.stringify(orders)); }, [orders]);
            useEffect(() => { localStorage.setItem('t1_ledger', JSON.stringify(transactions)); }, [transactions]);

            const [showBusinessDetails, setShowBusinessDetails] = useState(false);
            const [orderData, setOrderData] = useState({
                businessName: '', businessAddress: '', businessPhone: '', businessEmail: '', businessWebsite: '',
                customerName: '', orderName: '', dateRequired: '', orderDescription: '', designNotes: '', mockupImage: null,
                setupFees: '', digitizingFee: '', digitizingCost: '', taxRate: 5, discount: '', machineReservePercent: '5'
            });
            const [items, setItems] = useState([{
                id: genId(), name: '', color: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35, sizes: generateEmptySizes(),
                locations: [ { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' } ]
            }]);

            const [dashView, setDashView] = useState('annual');
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [accounts, setAccounts] = useState(['Primary Business Checking', 'PayPal', 'Stripe', 'Business Credit Card']);
            const [categories, setCategories] = useState({
                income: ['Product Sales', 'Service Income', 'Online Sales', 'Consulting / Freelance', 'Other Business Income'],
                expense: ['Advertising & Marketing', 'Shipping & Packaging', 'Software & Subscriptions', 'Office Supplies', 'Travel', 'Rent', 'Professional Fees', 'Garments / Blanks', 'Consumables (DTF/Thread)']
            });

            // --- QUOTER LOGIC ---
            const updateOrder = (field, value) => setOrderData(prev => ({ ...prev, [field]: value }));
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) { const reader = new FileReader(); reader.onloadend = () => updateOrder('mockupImage', reader.result); reader.readAsDataURL(file); }
                e.target.value = null;
            };
            const updateItem = (itemId, field, value) => setItems(items.map(item => item.id === itemId ? { ...item, [field]: value } : item));
            const updateSize = (itemId, sizeKey, value) => setItems(items.map(item => item.id === itemId ? { ...item, sizes: { ...item.sizes, [sizeKey]: value } } : item));
            const addLocation = (itemId) => setItems(items.map(item => item.id === itemId ? { ...item, locations: [...item.locations, { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' }] } : item));
            const updateLocation = (itemId, locId, field, value) => setItems(items.map(item => item.id === itemId ? { ...item, locations: item.locations.map(loc => loc.id === locId ? { ...loc, [field]: value } : loc) } : item));
            const removeLocation = (itemId, locId) => setItems(items.map(item => item.id === itemId ? { ...item, locations: item.locations.filter(loc => loc.id !== locId) } : item));
            const addItem = () => setItems([...items, { id: genId(), name: '', color: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35, sizes: generateEmptySizes(), locations: [ { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' } ] }]);
            const duplicateItem = (itemToCopy) => setItems([...items, { ...JSON.parse(JSON.stringify(itemToCopy)), id: genId(), locations: itemToCopy.locations.map(loc => ({ ...loc, id: genId() })) }]);
            const removeItem = (itemId) => { if(items.length > 1) setItems(items.filter(item => item.id !== itemId)); };

            const calc = useMemo(() => {
                let orderGarmentCostTotal = 0, orderGarmentRetailTotal = 0, orderDecoRetailTotal = 0, orderDecoCostTotal = 0, totalDtfCost = 0, totalThreadCost = 0, totalStabilizerCost = 0;
                
                const processedItems = items.map(item => {
                    const sizeSum = SIZES_LIST.reduce((sum, size) => sum + Math.max(0, parseInt(item.sizes?.[size]) || 0), 0);
                    const calculatedQty = sizeSum > 0 ? sizeSum : Math.max(1, parseInt(item.qty) || 1);
                    const rawCost = parseFloat(item.rawCost) || 0;
                    const shipping = parseFloat(item.shippingCost) || 0;
                    const margin = parseFloat(item.margin) || 0;
                    const landedCost = rawCost + shipping;
                    const effectiveMargin = Math.min(margin, 99.9);
                    const clientGarmentPrice = landedCost / (1 - (effectiveMargin / 100));
                    
                    let dtfCount = 0, itemDecoPerPiece = 0, itemDecoCostPerPiece = 0, itemDtfCost = 0, itemThreadCost = 0, itemStabilizerCost = 0;
                    
                    const processedLocations = item.locations.map(loc => {
                        let baseCost = 0, matCost = 0;
                        if (loc.type === 'embroidery') {
                            baseCost = getEmbroideryCostPerPiece(parseInt(loc.stitches) || 0, calculatedQty);
                            if (loc.isPuff) baseCost += parseFloat(loc.puffMarkup) || 0;
                            let stabCost = 1.00;
                            let threadCost = ((parseInt(loc.stitches) || 0) / 2500);
                            matCost = stabCost + threadCost;
                            itemStabilizerCost += stabCost; itemThreadCost += threadCost;
                        } else if (loc.type === 'dtf') {
                            dtfCount++;
                            baseCost = dtfCount === 1 ? (DTF_PRIMARY_FEES[loc.dtfSize] || 0) : (DTF_SECONDARY_FEES[loc.dtfSize] || 0);
                            matCost = DTF_MATERIAL_COSTS[loc.dtfSize] || 0;
                            itemDtfCost += matCost;
                        }
                        let adjustmentCost = parseFloat(loc.adjustment) || 0;
                        let cost = Math.max(0, baseCost + adjustmentCost);
                        let locDiscount = adjustmentCost < 0 ? Math.abs(adjustmentCost) : 0;
                        itemDecoPerPiece += cost; itemDecoCostPerPiece += matCost;
                        return { ...loc, baseCost, cost, materialCost: matCost, locDiscount, isFirstDtf: loc.type === 'dtf' && dtfCount === 1 };
                    });
                    
                    const totalGarmentCost = landedCost * calculatedQty;
                    const totalGarmentRetail = clientGarmentPrice * calculatedQty;
                    const totalDecoRetail = itemDecoPerPiece * calculatedQty;
                    const totalDecoMaterialCost = itemDecoCostPerPiece * calculatedQty;
                    const validPlacementCount = item.locations.filter(l => l.type !== 'none').length;
                    const itemDecoDiscountPerPiece = processedLocations.reduce((sum, l) => sum + l.locDiscount, 0);
                    const itemTotalDecoDiscount = itemDecoDiscountPerPiece * calculatedQty;
                    const lineTotalPerPiece = clientGarmentPrice + itemDecoPerPiece;
                    const lineTotal = lineTotalPerPiece * calculatedQty;
                    const undiscountedLineTotalPerPiece = clientGarmentPrice + itemDecoPerPiece + itemDecoDiscountPerPiece;
                    const undiscountedLineTotal = undiscountedLineTotalPerPiece * calculatedQty;

                    orderGarmentCostTotal += totalGarmentCost; orderGarmentRetailTotal += totalGarmentRetail;
                    orderDecoRetailTotal += totalDecoRetail; orderDecoCostTotal += totalDecoMaterialCost;
                    totalDtfCost += itemDtfCost * calculatedQty; totalThreadCost += itemThreadCost * calculatedQty; totalStabilizerCost += itemStabilizerCost * calculatedQty;

                    return { ...item, calculatedQty, sizeSum, landedCost, clientGarmentPrice, processedLocations, validPlacementCount, itemDecoPerPiece, itemDecoCostPerPiece, itemTotalDecoDiscount, totalGarmentCost, totalGarmentRetail, totalDecoRetail, lineTotalPerPiece, lineTotal, undiscountedLineTotalPerPiece, undiscountedLineTotal };
                });

                const setup = parseFloat(orderData.setupFees) || 0;
                const digitizing = parseFloat(orderData.digitizingFee) || 0;
                const digitizingCost = parseFloat(orderData.digitizingCost) || 0;
                const discount = parseFloat(orderData.discount) || 0;
                const taxRate = parseFloat(orderData.taxRate) || 0;
                const totalDecoDiscount = processedItems.reduce((sum, item) => sum + item.itemTotalDecoDiscount, 0);
                const totalDiscount = totalDecoDiscount + discount;
                const subtotal = orderGarmentRetailTotal + orderDecoRetailTotal + setup + digitizing;
                const grossSubtotal = subtotal + totalDecoDiscount;
                const discountedSubtotal = Math.max(0, subtotal - discount);
                const tax = discountedSubtotal * (taxRate / 100);
                const grandTotal = discountedSubtotal + tax;
                
                let reservePercent = 5;
                if (orderData.machineReservePercent !== undefined && orderData.machineReservePercent !== '') {
                    reservePercent = parseFloat(orderData.machineReservePercent);
                    if (isNaN(reservePercent)) reservePercent = 0;
                }
                const machineReserve = discountedSubtotal * (reservePercent / 100);
                const totalRestockAndMachineFund = orderDecoCostTotal + machineReserve;
                const totalOrderCost = orderGarmentCostTotal + totalRestockAndMachineFund + digitizingCost;
                const grossProfit = discountedSubtotal - orderGarmentCostTotal;
                const netProfit = grossProfit - orderDecoCostTotal - machineReserve - digitizingCost;
                const totalMarginPercent = discountedSubtotal > 0 ? (netProfit / discountedSubtotal) * 100 : 0;
                const isProfitable = netProfit > 0;
                const deposit = Math.ceil(grandTotal) / 2;

                return {
                    items: processedItems, orderGarmentCostTotal, orderGarmentRetailTotal, orderDecoRetailTotal, orderDecoCostTotal,
                    totalDtfCost, totalThreadCost, totalStabilizerCost, setup, digitizing, digitizingCost, discount, reservePercent, machineReserve, subtotal, grossSubtotal, discountedSubtotal, tax, grandTotal,
                    totalRestockAndMachineFund, totalOrderCost, grossProfit, netProfit, totalMarginPercent, isProfitable, totalDiscount, deposit
                };
            }, [items, orderData]);

            const getSizeString = (item) => {
                const activeSizes = SIZES_LIST.filter(s => (parseInt(item.sizes?.[s]) || 0) > 0);

            const handlePrint = (viewType) => {
                if (window.html2pdf) {

                    if (viewType === 'internal') { elementId = 'internal-view'; suffix = 'Internal_Breakdown'; } 
                    else if (viewType === 'invoice') { elementId = 'invoice-view'; suffix = 'Final_Invoice'; } 
                    else if (viewType === 'receipt') { elementId = 'receipt-view'; suffix = 'Receipt'; }

                    const element = document.getElementById(elementId);
                    if(!element) return;
                    
                    const noPrintElements = element.querySelectorAll('.no-print');
                    noPrintElements.forEach(el => el.style.display = 'none');
                    const safeCustomerName = orderData.customerName ? orderData.customerName.replace(/[^a-z0-9]/gi, '_') : 'Customer';
                    const defaultFileName = `${new Date().toLocaleDateString().replace(/\//g, '_')}_${safeCustomerName}_${suffix}.pdf`;
                    let finalFileName = window.prompt("Enter a name to save this PDF:", defaultFileName);
                    if (finalFileName === null) { noPrintElements.forEach(el => el.style.display = ''); return; }
                    if (!finalFileName.toLowerCase().endsWith('.pdf')) finalFileName += '.pdf';
                    
                    const opt = { margin: 0.5, filename: finalFileName, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
                    window.html2pdf().set(opt).from(element).save().then(() => { noPrintElements.forEach(el => el.style.display = ''); });
                } else window.print();
            };

            const handleExportQuoter = () => {

                if (finalFileName === null) return;
                if (!finalFileName.endsWith('.json')) finalFileName += '.json';
                const blob = new Blob([JSON.stringify({ orderData, items }, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = finalFileName; a.click(); URL.revokeObjectURL(url);
            };

            const handleImportQuoter = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const importedData = JSON.parse(ev.target.result);
                        if (importedData.orderData && importedData.items) {
                            setOrderData({ ...orderData, ...importedData.orderData });
                            setItems(importedData.items.map(item => {
                                const fullSizes = generateEmptySizes();
                                if (item.sizes) Object.keys(item.sizes).forEach(k => { if (fullSizes.hasOwnProperty(k)) fullSizes[k] = item.sizes[k]; });
                                return { ...item, sizes: fullSizes };
                            }));
                            alert('Quote loaded successfully!');
                        } else alert('Invalid file format.');
                    } catch (err) { alert('Error reading file.'); }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            // --- PIPELINE ACTIONS ---
            const handleSendToPipeline = () => {

                return { income, expenses, profit, margin };

                                                </div>
                                            </div>
                                            <div className="col-span-2 text-center font-bold text-slate-700 pt-1">{item.calculatedQty}</div>
                                            <div className="col-span-2 text-right font-bold text-slate-700 pt-1">{formatCurrency(item.undiscountedLineTotalPerPiece)}</div>
                                            <div className="col-span-2 text-right font-black text-slate-900 pt-1 text-lg">{formatCurrency(item.undiscountedLineTotal)}</div>
                                        </div>
                                    </div>
                                )})}
                            </div>

                            <div className="w-full md:w-1/2 ml-auto space-y-4 text-base break-inside-avoid">
                                {(calc.setup > 0 || calc.digitizing > 0) && <div className="flex justify-between text-slate-600"><span>Setup & Digitizing</span><span className="font-semibold">{formatCurrency(calc.setup + calc.digitizing)}</span></div>}
                                <div className="flex justify-between text-slate-900 font-bold pt-3 border-t border-slate-200"><span>Subtotal</span><span>{formatCurrency(calc.grossSubtotal)}</span></div>
                                {calc.totalDiscount > 0 && <div className="flex justify-between text-emerald-600 font-bold bg-emerald-50 p-2 rounded-lg"><span>Discount Applied</span><span>-{formatCurrency(calc.totalDiscount)}</span></div>}
                                <div className="flex justify-between text-slate-600"><span>Tax ({orderData.taxRate}%)</span><span>{formatCurrency(calc.tax)}</span></div>

                                <div className="flex justify-between items-end pt-5 border-t-2 border-slate-900">
                                    <span className="font-black text-slate-900 uppercase tracking-widest">{docType === 'proposal' ? 'Total' : 'Order Total'}</span>
                                    <span className="font-black text-4xl text-indigo-700">{formatCurrency(calc.grandTotal)}</span>
                                </div>

                                {docType === 'proposal' && (
                                    <div className="mt-8 bg-slate-50 p-6 rounded-xl text-center border border-slate-200 shadow-sm">
                                        <p className="text-slate-500 font-bold text-xs uppercase tracking-widest mb-2">Deposit Required to Begin</p>
                                        <p className="text-3xl font-black text-slate-900">{formatCurrency(calc.deposit)}</p>
                                    </div>
                                )}
                            </div>
                            
                            <div className="mt-16 pt-8 border-t border-slate-200 text-center break-inside-avoid">
                                <p className="text-slate-500 text-sm font-bold uppercase tracking-widest">{docType === 'proposal' ? '* Quotes are valid for 14 days.' : 'Thank you for your business!'}</p>
                            </div>
                        </div>
                    </div>
                );
            };

            const KPICard = ({ title, value, icon: IconCmp, color, subtext }) => (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col relative overflow-hidden group">
                    <div className={`absolute -right-2 -top-2 p-6 opacity-[0.03] transition-transform group-hover:scale-110 text-${color}-600`}><IconCmp size={80} /></div>
                    <span className="text-slate-400 text-[10px] font-black uppercase tracking-widest">{title}</span>
                    <div className="mt-3"><span className="text-3xl font-black text-slate-800">{typeof value === 'number' && title !== 'Profit Margin' ? `$${value.toLocaleString(undefined, { minimumFractionDigits: 2 })}` : value}</span></div>
                    <span className="text-xs text-slate-400 mt-2 font-medium">{subtext}</span>
                </div>
            );

            const renderBookDashboard = () => (
                <div className="space-y-6">
                    <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex gap-2 bg-slate-100 p-1.5 rounded-xl">
                            <button onClick={() => setDashView('annual')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${dashView === 'annual' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-800'}`}>Annual</button>
                            <button onClick={() => setDashView('5year')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${dashView === '5year' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-800'}`}>5-Year</button>
                        </div>
                        {dashView === 'annual' && (
                            <select value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)} className="soft-input rounded-xl px-5 py-2 text-sm font-bold text-indigo-700 cursor-pointer">
                                {[2024, 2025, 2026, 2027, 2028, 2029].map(y => <option key={y} value={y}>{y}</option>)}
                            </select>
                        )}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                        <KPICard title="Income" value={dashView === 'annual' ? annualTotals.income : fiveYearTotals.income} icon={(p) => <Icon name="trendingUp" {...p}/>} color="emerald" subtext={dashView === 'annual' ? 'Annual Gross' : 'Total 5-Year'} />
                        <KPICard title="Expenses" value={dashView === 'annual' ? annualTotals.expenses : fiveYearTotals.expenses} icon={(p) => <Icon name="trendingDown" {...p}/>} color="rose" subtext="Operational Costs" />
                        <KPICard title="Profit" value={dashView === 'annual' ? annualTotals.profit : fiveYearTotals.profit} icon={(p) => <Icon name="wallet" {...p}/>} color="amber" subtext="Net Profit" />
                        <KPICard title="Profit Margin" value={`${(dashView === 'annual' ? annualTotals.margin : fiveYearTotals.margin).toFixed(2)}%`} icon={(p) => <Icon name="pieChart" {...p}/>} color="indigo" subtext="Performance Ratio" />
                    </div>
                </div>
            );

            const renderBookLedger = () => (
                <div className="space-y-6">
                    <div className="bg-white p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
                        <h3 className={`text-lg font-black mb-6 flex items-center gap-2 ${bookTab === 'income' ? 'text-indigo-600' : 'text-rose-600'}`}><Icon name="plus" size={24} /> Log New {bookTab.charAt(0).toUpperCase() + bookTab.slice(1)}</h3>
                        <form onSubmit={addBookTransaction} className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-5">
                            <input type="hidden" name="type" value={currentLedgerType} />
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Gross Amount ($)</label><input required type="number" step="0.01" name="amount" className="w-full p-3 soft-input rounded-xl text-sm" /></div>
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Tax ($)</label><input type="number" step="0.01" name="tax" className="w-full p-3 soft-input rounded-xl text-sm" /></div>
                            <div className="space-y-1.5"><label className="text-[11px] font-bold text-slate-500 uppercase">Date</label><input required type="date" name="date" defaultValue={new Date().toISOString().split('T')[0]} className="w-full p-3 soft-input rounded-xl text-sm text-slate-600" /></div>
                            <div className="space-y-1.5 md:col-span-2"><label className="text-[11px] font-bold text-slate-500 uppercase">Category</label><select name="category" className="w-full p-3 soft-input rounded-xl text-sm">{categories[currentLedgerType].map(cat => <option key={cat} value={cat}>{cat}</option>)}</select></div>
                            <div className="space-y-1.5 md:col-span-2"><label className="text-[11px] font-bold text-slate-500 uppercase">Description / Notes</label><input type="text" name="description" className="w-full p-3 soft-input rounded-xl text-sm" /></div>
                            <div className="lg:col-span-5 flex justify-end mt-4"><button type="submit" className={`px-8 py-3 ${bookTab === 'income' ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-rose-600 hover:bg-rose-700'} text-white rounded-xl font-bold shadow-md transition-all active:scale-95`}>Save Record</button></div>
                        </form>
                    </div>
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center"><h3 className="text-xs font-black text-slate-500 uppercase tracking-widest">Transaction Ledger</h3></div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead className="bg-slate-800 text-white uppercase font-bold tracking-widest text-[10px]">
                                    <tr><th className="px-5 py-4 text-left">Date</th><th className="px-5 py-4 text-left">Category</th><th className="px-5 py-4 text-right">Amount</th><th className="px-5 py-4 text-left">Desc</th><th className="px-5 py-4 text-center"></th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredLedgerTransactions.map(t => (
                                        <tr key={t.id} className="hover:bg-slate-50 transition-colors group">
                                            <td className="px-5 py-4 text-slate-500 whitespace-nowrap">{t.date}</td><td className="px-5 py-4 font-bold text-slate-800 whitespace-nowrap">{t.category}</td><td className="px-5 py-4 text-right text-slate-500">${t.amount.toLocaleString()}</td><td className="px-5 py-4 text-slate-500 italic truncate max-w-[120px]">{t.description}</td><td className="px-5 py-4 text-center"><button onClick={() => deleteBookTransaction(t.id)} className="text-slate-300 hover:text-red-500"><Icon name="trash" size={16} /></button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-content flex flex-col">
                    <div className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30 pt-safe no-print">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 p-4">
                            <div><h1 className="text-2xl font-black flex items-center gap-2 tracking-tight text-slate-800"><Icon name="layers" size={28} className="text-indigo-600"/> HQB Pro</h1></div>
                            
                            <div className="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200 overflow-x-auto hide-scrollbar">
                                <button onClick={() => setAppModule('quoter')} className={`flex items-center gap-2 px-6 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'quoter' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon name="calculator" size={18} /> Quoter</button>
                                <button onClick={() => setAppModule('pipeline')} className={`flex items-center gap-2 px-6 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'pipeline' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon name="layers" size={18} /> Pipeline</button>
                                <button onClick={() => setAppModule('bookkeeping')} className={`flex items-center gap-2 px-6 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'bookkeeping' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon name="wallet" size={18} /> Ledger</button>
                            </div>
                        </div>
                    </div>

                    <div className="p-4 md:p-6 max-w-4xl w-full mx-auto flex-1">
                        <div className="fade-in">
                            {appModule === 'pipeline' && renderPipeline()}
                            {appModule === 'quoter' && (
                                <>
                                    {quoterTab === 'build' && renderQuoterBuild()}
                                    {quoterTab === 'internal' && renderQuoterInternal()}
                                    {quoterTab === 'proposal' && renderQuoterDoc('proposal')}
                                    {quoterTab === 'invoice' && renderQuoterDoc('invoice')}
                                    {quoterTab === 'receipt' && renderQuoterDoc('receipt')}
                                </>
                            )}
                            {appModule === 'bookkeeping' && (
                                <>
                                    {bookTab === 'dashboard' && renderBookDashboard()}
                                    {bookTab === 'income' && renderBookLedger()}
                                    {bookTab === 'expenses' && renderBookLedger()}
                                </>
                            )}
                        </div>
                    </div>

                    {appModule !== 'pipeline' && (
                        <div className="fixed bottom-0 w-full bg-white border-t border-slate-200 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)] z-30 no-print pb-safe">
                            <div className="max-w-4xl mx-auto flex h-16 md:h-20">
                                {appModule === 'quoter' ? (
                                    <>
                                        <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider transition-colors ${quoterTab === 'build' ? 'text-indigo-700 bg-indigo-50/80 border-t-2 border-indigo-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('build')}><Icon name="calculator" size={22} /> Builder</button>
                                        <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${quoterTab === 'internal' ? 'text-emerald-700 bg-emerald-50/80 border-t-2 border-emerald-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('internal')}><Icon name="eye" size={22} /> Internal</button>
                                        <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${quoterTab === 'proposal' ? 'text-indigo-700 bg-indigo-50/80 border-t-2 border-indigo-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('proposal')}><Icon name="fileText" size={22} /> Proposal</button>
                                        <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${quoterTab === 'invoice' ? 'text-indigo-700 bg-indigo-50/80 border-t-2 border-indigo-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('invoice')}><Icon name="receipt" size={22} /> Invoice</button>
                                        <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${quoterTab === 'receipt' ? 'text-emerald-700 bg-emerald-50/80 border-t-2 border-emerald-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setQuoterTab('receipt')}><Icon name="fileCheck" size={22} /> Receipt</button>
                                    </>
                                ) : (
                                    <>
                                        <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider transition-colors ${bookTab === 'dashboard' ? 'text-indigo-700 bg-indigo-50/80 border-t-2 border-indigo-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setBookTab('dashboard')}><Icon name="layoutDashboard" size={22} /> Dashboard</button>
                                        <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${bookTab === 'income' ? 'text-emerald-700 bg-emerald-50/80 border-t-2 border-emerald-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setBookTab('income')}><Icon name="trendingUp" size={22} /> Income</button>
                                        <button className={`flex-1 flex flex-col items-center justify-center gap-1 font-bold text-[10px] md:text-xs uppercase tracking-wider border-l border-slate-100 transition-colors ${bookTab === 'expenses' ? 'text-rose-700 bg-rose-50/80 border-t-2 border-rose-600' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50 border-t-2 border-transparent'}`} onClick={() => setBookTab('expenses')}><Icon name="trendingDown" size={22} /> Expenses</button>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {receiptData && (
                        <div style={{ position: 'absolute', left: '-9999px', top: 0 }}>
                            <div ref={receiptRef} style={{ width: '8.5in', padding: '1in', backgroundColor: 'white', color: '#0f172a', fontFamily: 'sans-serif' }}>
                                <div style={{ borderBottom: '2px solid #1e293b', paddingBottom: '20px', marginBottom: '30px', display: 'flex', justifyContent: 'space-between' }}>
                                    <div>
                                        <h1 style={{ fontSize: '36px', fontWeight: '900', margin: '0 0 10px 0', textTransform: 'uppercase' }}>Receipt</h1>
                                        <h2 style={{ fontSize: '18px', fontWeight: 'bold', margin: '0' }}>Triple One Threads</h2>
                                        <p style={{ margin: '5px 0 0 0', color: '#64748b' }}>Beaumont, AB</p>
                                    </div>
                                    <div style={{ textAlign: 'right' }}>
                                        <p style={{ fontWeight: 'bold', fontSize: '16px', margin: '0 0 5px 0' }}>Date: {receiptData.date}</p>
                                        <p style={{ color: '#64748b', margin: '0' }}>Order ID: {receiptData.id}</p>
                                    </div>
                                </div>
                                <div style={{ marginBottom: '40px' }}>
                                    <p style={{ color: '#64748b', fontSize: '12px', fontWeight: 'bold', textTransform: 'uppercase', marginBottom: '5px' }}>Billed To:</p>
                                    <p style={{ fontSize: '20px', fontWeight: 'bold', margin: '0' }}>{receiptData.customer}</p>
                                </div>
                                <div style={{ borderBottom: '1px solid #cbd5e1', paddingBottom: '10px', marginBottom: '10px', display: 'flex', justifyContent: 'space-between', fontWeight: 'bold', color: '#64748b', textTransform: 'uppercase', fontSize: '12px' }}>
                                    <span>Description</span><span>Total</span>
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '18px', paddingBottom: '20px', borderBottom: '1px solid #cbd5e1' }}>
                                    <span>{receiptData.desc}</span><span style={{ fontWeight: 'bold' }}>${receiptData.total.toFixed(2)}</span>
                                </div>
                                <div style={{ width: '300px', marginLeft: 'auto', marginTop: '20px' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px', color: '#64748b' }}>
                                        <span>Total Amount</span><span>${receiptData.total.toFixed(2)}</span>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px', color: '#10b981', fontWeight: 'bold' }}>
                                        <span>Amount Paid</span><span>-${receiptData.total.toFixed(2)}</span>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '20px', paddingTop: '20px', borderTop: '2px solid #0f172a', fontSize: '24px', fontWeight: '900' }}>
                                        <span>Balance Due</span><span style={{ color: '#10b981' }}>$0.00</span>
                                    </div>
                                </div>
                                <div style={{ marginTop: '50px', textAlign: 'center', padding: '20px', backgroundColor: '#ecfdf5', borderRadius: '10px', border: '1px solid #a7f3d0' }}>
                                    <h3 style={{ margin: '0', color: '#059669', fontSize: '24px', textTransform: 'uppercase', letterSpacing: '2px', fontWeight: '900' }}>Paid In Full</h3>
                                    <p style={{ margin: '10px 0 0 0', color: '#047857' }}>Thank you for your business!</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
