<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid Quoter & Bookkeeper Pro</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        input[type="text"], input[type="number"], input[type="date"], select, textarea { font-size: 16px !important; }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .pb-content { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 90px); }
        
        @media print {
            @page { margin: 0; }
            body { background-color: white !important; margin: 1cm !important; }
            .no-print { display: none !important; }
            .print-full-width { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .print-no-shadow { box-shadow: none !important; border: none !important; }
            .page-container { background: transparent !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .soft-input { background-color: #f8fafc; border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .soft-input:focus { background-color: #ffffff; border-color: #818cf8; box-shadow: 0 0 0 3px #e0e7ff; outline: none; }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900 selection:bg-indigo-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                calculator: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
                user: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                shirt: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>,
                fileText: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>,
                layers: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
                plus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                download: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                copy: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
                check: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
                x: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                wallet: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
            };
            return icons[name] || null;
        };

        // --- CONSTANTS ---
        const STAGES = [
            { id: 'quote', label: '1. Quote Issued', color: 'bg-slate-200 text-slate-800' },
            { id: 'new', label: '2. Deposit Paid', color: 'bg-sky-100 text-sky-800' },
            { id: 'ordering', label: '3. Ordering Blanks', color: 'bg-amber-100 text-amber-800' },
            { id: 'receiving', label: '4. Receiving Blanks', color: 'bg-orange-100 text-orange-800' },
            { id: 'prepping', label: '5. Prepping / DTF', color: 'bg-indigo-100 text-indigo-800' },
            { id: 'printing', label: '6. Emb / Print', color: 'bg-blue-100 text-blue-800' },
            { id: 'pickup', label: '7. Ready for Pickup', color: 'bg-emerald-100 text-emerald-800' }
        ];

        const STITCH_MATRIX = [
            { maxStitch: 8000, prices: [15, 15, 14.5, 14.5, 14] },
            { maxStitch: 15000, prices: [22.5, 22, 21, 21, 20] },
            { maxStitch: 20000, prices: [30, 28, 27, 27, 25] },
            { maxStitch: Infinity, prices: [50, 45, 43, 43, 40] }
        ];
        const QTY_TIERS = [{ max: 10, index: 0 }, { max: 49, index: 1 }, { max: 100, index: 2 }, { max: 299, index: 3 }, { max: Infinity, index: 4 }];
        const getEmbroideryCostPerPiece = (stitches, qty) => {
            if (!stitches || stitches <= 0) return 0;
            const sRow = STITCH_MATRIX.find(r => stitches <= r.maxStitch) || STITCH_MATRIX[STITCH_MATRIX.length - 1];
            const qCol = QTY_TIERS.find(q => qty <= q.max) || QTY_TIERS[QTY_TIERS.length - 1];
            return sRow.prices[qCol.index];
        };

        const DTF_SIZES = [
            { id: 'xs', label: 'Extra Small / Hat (2.5"x2.5")' }, { id: 'small', label: 'Small / Left Chest (4"x4")' }, { id: 'medium', label: 'Mid-size / Youth (8"x8")' },
            { id: 'sleeve', label: 'Sleeve / Long Strip' }, { id: 'large', label: 'Standard Full Back (11"x11")' }, { id: 'xlarge', label: 'Oversized (13"x16")' }, { id: 'jumbo', label: 'Jumbo (16"x20")' }
        ];
        const PLACEMENTS = [
            { id: 'custom', label: 'Custom / Other' }, { id: 'fc', label: 'Front - Center Chest' }, { id: 'lc', label: 'Front - Left Chest' }, { id: 'rc', label: 'Front - Right Chest' },
            { id: 'bc', label: 'Back - Center' }, { id: 'sleeve_l', label: 'Left Sleeve' }, { id: 'sleeve_r', label: 'Right Sleeve' }, { id: 'hat_front', label: 'Hat - Front Center' },
            { id: 'hat_left', label: 'Hat - Left Panel' }, { id: 'hat_right', label: 'Hat - Right Panel' }, { id: 'hat_back', label: 'Hat - Back Arch' }
        ];
        const SIZES_LIST = ['XS', 'S', 'M', 'L', 'XL', '2X', '3X', '4X', '5X'];
        const DTF_PRIMARY_FEES = { xs: 8.00, small: 11.33, medium: 16.00, sleeve: 19.50, large: 22.00, xlarge: 28.00, jumbo: 35.00 };
        const DTF_SECONDARY_FEES = { xs: 3.50, small: 4.50, medium: 8.00, sleeve: 10.50, large: 12.00, xlarge: 15.00, jumbo: 20.00 };
        const DTF_MATERIAL_COSTS = { xs: 0.35, small: 0.67, medium: 2.67, sleeve: 1.75, large: 5.04, xlarge: 8.67, jumbo: 12.50 };

        const genId = () => Math.random().toString(36).substr(2, 9);
        const formatCurrency = (val) => '$' + (val || 0).toFixed(2);
        const generateEmptySizes = () => SIZES_LIST.reduce((acc, size) => { acc[size] = ''; return acc; }, {});

        // --- MAIN APP COMPONENT ---
        function App() {
            const [appModule, setAppModule] = useState('pipeline'); 
            const [showInternalBreakdown, setShowInternalBreakdown] = useState(false);
            
            const [selectedOrder, setSelectedOrder] = useState(null); // For the Pipeline Modal
            const pdfGenRef = useRef(null);
            const [pdfConfig, setPdfConfig] = useState(null); // { order: {}, type: 'proposal'|'invoice'|'receipt' }

            // Safe Local Storage Persistence
            const [orders, setOrders] = useState(() => {
                try {
                    const saved = localStorage.getItem('t1_orders');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });
            const [transactions, setTransactions] = useState(() => {
                try {
                    const saved = localStorage.getItem('t1_ledger');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            useEffect(() => { localStorage.setItem('t1_orders', JSON.stringify(orders)); }, [orders]);
            useEffect(() => { localStorage.setItem('t1_ledger', JSON.stringify(transactions)); }, [transactions]);

            // Quoter State
            const [orderData, setOrderData] = useState({
                customerName: '', orderName: '', dateRequired: '', orderDescription: '', designNotes: '',
                setupFees: '', digitizingFee: '', digitizingCost: '', taxRate: 5, discount: '', machineReservePercent: '5'
            });
            const [items, setItems] = useState([{
                id: genId(), name: '', color: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35, sizes: generateEmptySizes(),
                locations: [ { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' } ]
            }]);

            // --- QUOTER LOGIC & MATH ---
            const updateOrder = (field, value) => setOrderData(prev => ({ ...prev, [field]: value }));
            const updateItem = (itemId, field, value) => setItems(items.map(item => item.id === itemId ? { ...item, [field]: value } : item));
            const updateSize = (itemId, sizeKey, value) => setItems(items.map(item => item.id === itemId ? { ...item, sizes: { ...item.sizes, [sizeKey]: value } } : item));
            const addLocation = (itemId) => setItems(items.map(item => item.id === itemId ? { ...item, locations: [...item.locations, { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' }] } : item));
            const updateLocation = (itemId, locId, field, value) => setItems(items.map(item => item.id === itemId ? { ...item, locations: item.locations.map(loc => loc.id === locId ? { ...loc, [field]: value } : loc) } : item));
            const removeLocation = (itemId, locId) => setItems(items.map(item => item.id === itemId ? { ...item, locations: item.locations.filter(loc => loc.id !== locId) } : item));
            const addItem = () => setItems([...items, { id: genId(), name: '', color: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35, sizes: generateEmptySizes(), locations: [ { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' } ] }]);
            const duplicateItem = (itemToCopy) => setItems([...items, { ...JSON.parse(JSON.stringify(itemToCopy)), id: genId(), locations: itemToCopy.locations.map(loc => ({ ...loc, id: genId() })) }]);
            const removeItem = (itemId) => { if(items.length > 1) setItems(items.filter(item => item.id !== itemId)); };

            const calc = useMemo(() => {
                let orderGarmentCostTotal = 0, orderGarmentRetailTotal = 0, orderDecoRetailTotal = 0, orderDecoCostTotal = 0, totalDtfCost = 0, totalThreadCost = 0, totalStabilizerCost = 0;
                
                const processedItems = items.map(item => {
                    const sizeSum = SIZES_LIST.reduce((sum, size) => sum + Math.max(0, parseInt(item.sizes?.[size]) || 0), 0);
                    const calculatedQty = sizeSum > 0 ? sizeSum : Math.max(1, parseInt(item.qty) || 1);
                    const rawCost = parseFloat(item.rawCost) || 0;
                    const shipping = parseFloat(item.shippingCost) || 0;
                    const margin = parseFloat(item.margin) || 0;
                    const landedCost = rawCost + shipping;
                    const effectiveMargin = Math.min(margin, 99.9);
                    const clientGarmentPrice = landedCost / (1 - (effectiveMargin / 100));
                    
                    let dtfCount = 0, itemDecoPerPiece = 0, itemDecoCostPerPiece = 0, itemDtfCost = 0, itemThreadCost = 0, itemStabilizerCost = 0;
                    
                    const processedLocations = item.locations.map(loc => {
                        let baseCost = 0, matCost = 0;
                        if (loc.type === 'embroidery') {
                            baseCost = getEmbroideryCostPerPiece(parseInt(loc.stitches) || 0, calculatedQty);
                            if (loc.isPuff) baseCost += parseFloat(loc.puffMarkup) || 0;
                            let stabCost = 1.00;
                            let threadCost = ((parseInt(loc.stitches) || 0) / 2500);
                            matCost = stabCost + threadCost;
                            itemStabilizerCost += stabCost; itemThreadCost += threadCost;
                        } else if (loc.type === 'dtf') {
                            dtfCount++;
                            baseCost = dtfCount === 1 ? (DTF_PRIMARY_FEES[loc.dtfSize] || 0) : (DTF_SECONDARY_FEES[loc.dtfSize] || 0);
                            matCost = DTF_MATERIAL_COSTS[loc.dtfSize] || 0;
                            itemDtfCost += matCost;
                        }
                        let adjustmentCost = parseFloat(loc.adjustment) || 0;
                        let cost = Math.max(0, baseCost + adjustmentCost);
                        let locDiscount = adjustmentCost < 0 ? Math.abs(adjustmentCost) : 0;
                        itemDecoPerPiece += cost; itemDecoCostPerPiece += matCost;
                        return { ...loc, baseCost, cost, materialCost: matCost, locDiscount, isFirstDtf: loc.type === 'dtf' && dtfCount === 1 };
                    });
                    
                    const totalGarmentCost = landedCost * calculatedQty;
                    const totalGarmentRetail = clientGarmentPrice * calculatedQty;
                    const totalDecoRetail = itemDecoPerPiece * calculatedQty;
                    const totalDecoMaterialCost = itemDecoCostPerPiece * calculatedQty;
                    const itemDecoDiscountPerPiece = processedLocations.reduce((sum, l) => sum + l.locDiscount, 0);
                    const lineTotalPerPiece = clientGarmentPrice + itemDecoPerPiece;
                    const lineTotal = lineTotalPerPiece * calculatedQty;

                    orderGarmentCostTotal += totalGarmentCost; orderGarmentRetailTotal += totalGarmentRetail;
                    orderDecoRetailTotal += totalDecoRetail; orderDecoCostTotal += totalDecoMaterialCost;
                    totalDtfCost += itemDtfCost * calculatedQty; totalThreadCost += itemThreadCost * calculatedQty; totalStabilizerCost += itemStabilizerCost * calculatedQty;

                    return { ...item, calculatedQty, sizeSum, landedCost, clientGarmentPrice, processedLocations, itemDecoPerPiece, totalGarmentRetail, totalDecoRetail, lineTotalPerPiece, lineTotal };
                });

                const setup = parseFloat(orderData.setupFees) || 0;
                const digitizing = parseFloat(orderData.digitizingFee) || 0;
                const digitizingCost = parseFloat(orderData.digitizingCost) || 0;
                const discount = parseFloat(orderData.discount) || 0;
                const taxRate = parseFloat(orderData.taxRate) || 0;
                const subtotal = orderGarmentRetailTotal + orderDecoRetailTotal + setup + digitizing;
                const discountedSubtotal = Math.max(0, subtotal - discount);
                const tax = discountedSubtotal * (taxRate / 100);
                const grandTotal = discountedSubtotal + tax;
                
                let reservePercent = parseFloat(orderData.machineReservePercent) || 5;
                const machineReserve = discountedSubtotal * (reservePercent / 100);
                const totalOrderCost = orderGarmentCostTotal + orderDecoCostTotal + machineReserve + digitizingCost;
                const grossProfit = discountedSubtotal - orderGarmentCostTotal;
                const netProfit = grossProfit - orderDecoCostTotal - machineReserve - digitizingCost;
                const deposit = Math.ceil(grandTotal) / 2;

                return {
                    items: processedItems, orderGarmentCostTotal, orderDecoCostTotal,
                    totalDtfCost, totalThreadCost, totalStabilizerCost, setup, digitizing, digitizingCost, discount, machineReserve, subtotal, discountedSubtotal, tax, grandTotal,
                    totalOrderCost, grossProfit, netProfit, deposit
                };
            }, [items, orderData]);

            // --- WORKFLOW ACTIONS ---
            const handleSendToPipeline = () => {
                if(!orderData.customerName) return alert("Please add a Customer Name before sending to the Pipeline.");
                const newOrder = {
                    id: `JOB-${Date.now().toString().slice(-4)}`,
                    customer: orderData.customerName,
                    desc: orderData.orderName || `${calc.items.reduce((sum, item) => sum + item.calculatedQty, 0)}x Garments`,
                    stage: 'quote',
                    total: calc.grandTotal,
                    balance: calc.grandTotal,
                    depositAmount: calc.deposit,
                    fullData: { orderData, items, calc }, // Save full state for modal viewing
                    dateAdded: new Date().toLocaleDateString()
                };
                setOrders([newOrder, ...orders]);
                
                // Reset Quoter
                setOrderData({ customerName: '', orderName: '', dateRequired: '', orderDescription: '', designNotes: '', setupFees: '', digitizingFee: '', digitizingCost: '', taxRate: 5, discount: '', machineReservePercent: '5' });
                setItems([{ id: genId(), name: '', color: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35, sizes: generateEmptySizes(), locations: [ { id: genId(), type: 'none', placement: 'custom', stitches: '', dtfSize: 'small', desc: '', isPuff: false, puffMarkup: 5, adjustment: '' } ] }]);
                setAppModule('pipeline');
            };

            const handleApproveQuote = (order) => {
                if (confirm(`Approve this quote and log the ${formatCurrency(order.depositAmount)} deposit?`)) {
                    const newTx = { id: Date.now(), type: 'income', date: new Date().toISOString().split('T')[0], category: 'Product Sales', amount: order.depositAmount, description: `Deposit: ${order.customer} - ${order.desc}` };
                    setTransactions(prev => [newTx, ...prev]);
                    const updatedOrder = { ...order, balance: order.total - order.depositAmount, stage: 'new' };
                    setOrders(orders.map(o => o.id === order.id ? updatedOrder : o));
                    setSelectedOrder(updatedOrder); // Update modal view
                }
            };

            const handleClearBalance = (order) => {
                if (confirm(`Clear remaining balance of ${formatCurrency(order.balance)}?`)) {
                    if (order.balance > 0) {
                        const newTx = { id: Date.now(), type: 'income', date: new Date().toISOString().split('T')[0], category: 'Product Sales', amount: order.balance, description: `Final Payment: ${order.customer} - ${order.desc}` };
                        setTransactions(prev => [newTx, ...prev]);
                    }
                    const updatedOrder = { ...order, balance: 0 };
                    setOrders(orders.map(o => o.id === order.id ? updatedOrder : o));
                    setSelectedOrder(updatedOrder);
                }
            };

            const handleArchive = (orderId) => {
                if(confirm("Archive this order? It will be removed from the pipeline.")) {
                    setOrders(orders.filter(o => o.id !== orderId));
                    setSelectedOrder(null);
                }
            };

            // --- PDF GENERATION ENGINE ---
            useEffect(() => {
                if (pdfConfig && pdfGenRef.current) {
                    const { order, type } = pdfConfig;
                    const safeName = order.customer ? order.customer.replace(/[^a-z0-9]/gi, '_') : 'Customer';
                    const suffix = type === 'proposal' ? 'Proposal' : type === 'invoice' ? 'Invoice' : 'Receipt';
                    
                    const opt = { margin: 0.5, filename: `${safeName}_${suffix}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
                    
                    // Show hidden ref, print, hide
                    pdfGenRef.current.style.display = 'block';
                    html2pdf().set(opt).from(pdfGenRef.current).save().then(() => {
                        pdfGenRef.current.style.display = 'none';
                        setPdfConfig(null);
                    });
                }
            }, [pdfConfig]);

            // --- RENDER QUOTER (Simplified) ---
            const renderQuoter = () => (
                <div className="space-y-6 pb-6 fade-in">
                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-sm font-bold text-slate-800 flex items-center gap-2 uppercase tracking-wider"><Icon name="calculator" size={18} className="text-indigo-500" /> Build Quote</h2>
                            <button onClick={() => setShowInternalBreakdown(!showInternalBreakdown)} className="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100">
                                {showInternalBreakdown ? 'Hide Math' : 'View Internal Breakdown'}
                            </button>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                            <div><label className="block text-xs font-semibold text-slate-500 mb-1">Customer / Company</label><input type="text" className="w-full p-3 soft-input rounded-xl text-sm" value={orderData.customerName} onChange={e => updateOrder('customerName', e.target.value)} /></div>
                            <div><label className="block text-xs font-semibold text-slate-500 mb-1">Order Name</label><input type="text" placeholder="e.g. Summer Staff Gear" className="w-full p-3 soft-input rounded-xl text-sm" value={orderData.orderName} onChange={e => updateOrder('orderName', e.target.value)} /></div>
                            <div className="md:col-span-2"><label className="block text-xs font-semibold text-slate-500 mb-1">Job Overview (Visible on PDF)</label><textarea className="w-full p-3 soft-input rounded-xl text-sm resize-none" rows="2" value={orderData.orderDescription} onChange={e => updateOrder('orderDescription', e.target.value)}></textarea></div>
                        </div>

                        {items.map((item, index) => (
                            <div key={item.id} className="bg-slate-50 rounded-xl border border-slate-200 overflow-hidden mb-5">
                                <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-100/50">
                                    <h3 className="font-extrabold text-slate-700 text-xs uppercase tracking-wide">Garment Style {index + 1}</h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => duplicateItem(item)} className="text-slate-400 hover:text-indigo-500"><Icon name="copy" size={16} /></button>
                                        {items.length > 1 && <button onClick={() => removeItem(item.id)} className="text-slate-400 hover:text-red-500"><Icon name="trash" size={16} /></button>}
                                    </div>
                                </div>
                                <div className="p-4 space-y-4">
                                    <div className="flex flex-col md:flex-row gap-4">
                                        <div className="flex-[2]"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Item Desc</label><input type="text" className="w-full p-2.5 soft-input rounded-lg text-sm" value={item.name} onChange={e => updateItem(item.id, 'name', e.target.value)} /></div>
                                        <div className="flex-1"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Color</label><input type="text" className="w-full p-2.5 soft-input rounded-lg text-sm" value={item.color} onChange={e => updateItem(item.id, 'color', e.target.value)} /></div>
                                        <div className="flex-1"><label className="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Total Qty</label><input type="number" className="w-full p-2.5 soft-input rounded-lg text-sm font-bold text-indigo-700" value={item.qty} onChange={e => updateItem(item.id, 'qty', e.target.value)} /></div>
                                    </div>
                                    <div className="grid grid-cols-3 gap-3 bg-white p-3 rounded-lg border border-slate-200">
                                        <div><label className="block text-[10px] font-bold text-slate-500 mb-1">Wholesale $</label><input type="number" className="w-full p-2 soft-input rounded-md text-sm" value={item.rawCost} onChange={e => updateItem(item.id, 'rawCost', e.target.value)} /></div>
                                        <div><label className="block text-[10px] font-bold text-slate-500 mb-1">Freight $</label><input type="number" className="w-full p-2 soft-input rounded-md text-sm" value={item.shippingCost} onChange={e => updateItem(item.id, 'shippingCost', e.target.value)} /></div>
                                        <div><label className="block text-[10px] font-bold text-slate-500 mb-1">Margin %</label><input type="number" className="w-full p-2 soft-input rounded-md text-sm text-indigo-700 font-bold" value={item.margin} onChange={e => updateItem(item.id, 'margin', e.target.value)} /></div>
                                    </div>
                                    
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Decorations</p>
                                        {item.locations.map(loc => (
                                            <div key={loc.id} className="bg-white border border-slate-200 rounded-lg p-3 mb-2 flex gap-3 items-center relative pr-8">
                                                {item.locations.length > 1 && <button onClick={() => removeLocation(item.id, loc.id)} className="absolute right-2 top-2 text-slate-300 hover:text-red-500"><Icon name="x" size={14} /></button>}
                                                <select className="flex-1 p-2 soft-input rounded-md text-xs font-bold" value={loc.type} onChange={e => updateLocation(item.id, loc.id, 'type', e.target.value)}><option value="none">None</option><option value="embroidery">Embroidery</option><option value="dtf">DTF Print</option></select>
                                                {loc.type === 'embroidery' && <input type="number" placeholder="Stitches" className="flex-1 p-2 soft-input rounded-md text-xs" value={loc.stitches} onChange={e => updateLocation(item.id, loc.id, 'stitches', e.target.value)} />}
                                                {loc.type === 'dtf' && <select className="flex-1 p-2 soft-input rounded-md text-xs" value={loc.dtfSize} onChange={e => updateLocation(item.id, loc.id, 'dtfSize', e.target.value)}>{DTF_SIZES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}</select>}
                                                {loc.type !== 'none' && <input type="text" placeholder="Notes (e.g. Left Chest)" className="flex-[2] p-2 soft-input rounded-md text-xs" value={loc.desc} onChange={e => updateLocation(item.id, loc.id, 'desc', e.target.value)} />}
                                            </div>
                                        ))}
                                        <button onClick={() => addLocation(item.id)} className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-md mt-1">+ Add Decor</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                        <button onClick={addItem} className="w-full py-3 border-2 border-dashed border-slate-300 rounded-xl text-slate-500 font-bold text-sm hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all">+ Add Garment Style</button>
                    </div>

                    {showInternalBreakdown && (
                        <div className="bg-slate-900 text-white rounded-2xl p-6 shadow-lg">
                            <h3 className="text-sm font-bold border-b border-slate-700 pb-3 mb-4 text-indigo-300 uppercase tracking-widest">Internal Math</h3>
                            <div className="grid grid-cols-2 gap-4 text-sm">
                                <div className="flex justify-between"><span className="text-slate-400">Total Rev:</span><span className="font-bold">{formatCurrency(calc.discountedSubtotal)}</span></div>
                                <div className="flex justify-between"><span className="text-slate-400">Garment Cost:</span><span className="font-bold text-rose-400">-{formatCurrency(calc.orderGarmentCostTotal)}</span></div>
                                <div className="flex justify-between"><span className="text-slate-400">Consumables:</span><span className="font-bold text-rose-400">-{formatCurrency(calc.orderDecoCostTotal)}</span></div>
                                <div className="flex justify-between"><span className="text-slate-400">Reserve/Savings:</span><span className="font-bold text-amber-400">-{formatCurrency(calc.machineReserve)}</span></div>
                            </div>
                            <div className="mt-4 pt-4 border-t border-slate-700 flex justify-between items-center">
                                <span className="font-bold uppercase tracking-widest text-xs text-slate-300">Net Take-Home Profit</span>
                                <span className="text-3xl font-black text-emerald-400">{formatCurrency(calc.netProfit)}</span>
                            </div>
                        </div>
                    )}

                    <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                        <div className="flex justify-between items-end border-b border-slate-100 pb-4 mb-4">
                            <span className="text-slate-500 font-bold uppercase tracking-widest text-sm">Order Total</span>
                            <span className="text-4xl font-black text-indigo-700">{formatCurrency(calc.grandTotal)}</span>
                        </div>
                        <button onClick={handleSendToPipeline} className="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold text-lg shadow-md hover:bg-emerald-700 active:scale-95 transition-all">
                            Save & Send to Pipeline
                        </button>
                    </div>
                </div>
            );

            // --- RENDER PIPELINE & MODAL ---
            const renderPipeline = () => (
                <div className="flex overflow-x-auto hide-scrollbar gap-4 pb-4 -mx-4 px-4 snap-x fade-in h-full">
                    {STAGES.map(stage => {
                        const stageItems = orders.filter(o => o.stage === stage.id);
                        return (
                            <div key={stage.id} className="min-w-[280px] w-[280px] flex-shrink-0 snap-center bg-slate-100/50 rounded-2xl border border-slate-200 flex flex-col max-h-[75vh]">
                                <div className={`p-3 border-b border-slate-200 rounded-t-2xl font-black text-[11px] flex justify-between items-center uppercase tracking-widest ${stage.color}`}>
                                    {stage.label} <span className="bg-white/50 px-2 py-0.5 rounded-full">{stageItems.length}</span>
                                </div>
                                <div className="p-3 overflow-y-auto space-y-3 flex-1">
                                    {stageItems.length === 0 ? <p className="text-[10px] text-slate-400 text-center py-6 font-bold uppercase">Empty</p> : stageItems.map(order => (
                                        <div key={order.id} onClick={() => setSelectedOrder(order)} className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 cursor-pointer hover:border-indigo-300 transition-colors relative active:scale-95">
                                            <span className="text-[9px] font-black text-slate-400 absolute top-3 right-3">{order.id}</span>
                                            <h4 className="font-bold text-slate-800 text-sm pr-10">{order.customer}</h4>
                                            <p className="text-[11px] text-slate-500 mt-1 truncate">{order.desc}</p>
                                            <div className="mt-3 pt-3 border-t border-slate-50 flex justify-between items-center">
                                                <span className={`text-[10px] font-bold px-2 py-1 rounded-md ${order.balance > 0 ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}>
                                                    {order.balance > 0 ? `Owes ${formatCurrency(order.balance)}` : 'Paid in Full'}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );

            // --- THE PIPELINE MODAL ---
            const renderModal = () => {
                if (!selectedOrder) return null;
                const { fullData, customer, id, stage, balance, total } = selectedOrder;
                const { calc: orderCalc, items: orderItems, orderData: oData } = fullData || {};

                return (
                    <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                        <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] shadow-2xl flex flex-col overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                            
                            {/* Modal Header */}
                            <div className="p-5 border-b border-slate-100 flex justify-between items-start bg-slate-50">
                                <div>
                                    <div className="flex items-center gap-2 mb-1">
                                        <h2 className="font-black text-2xl text-slate-800">{customer}</h2>
                                        <span className="text-[10px] font-bold bg-slate-200 text-slate-600 px-2 py-1 rounded-md">{id}</span>
                                    </div>
                                    <select value={stage} onChange={(e) => { moveOrder(id, e.target.value); setSelectedOrder({...selectedOrder, stage: e.target.value}); }} className="text-xs font-bold text-indigo-700 bg-indigo-50 border border-indigo-100 rounded-md p-1 outline-none">
                                        {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                                    </select>
                                </div>
                                <button onClick={() => setSelectedOrder(null)} className="bg-white p-2 rounded-full border border-slate-200 text-slate-400 hover:text-slate-800"><Icon name="x" size={20} /></button>
                            </div>

                            {/* Modal Body */}
                            <div className="p-5 overflow-y-auto flex-1 bg-white space-y-6">
                                {/* Financial Summary */}
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Order Total</span>
                                        <p className="font-black text-slate-800 text-lg">{formatCurrency(total)}</p>
                                    </div>
                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Paid</span>
                                        <p className="font-black text-emerald-600 text-lg">{formatCurrency(total - balance)}</p>
                                    </div>
                                    <div className={`p-3 rounded-xl border ${balance > 0 ? 'bg-rose-50 border-rose-100' : 'bg-emerald-50 border-emerald-100'}`}>
                                        <span className={`text-[10px] font-bold uppercase tracking-widest ${balance > 0 ? 'text-rose-400' : 'text-emerald-400'}`}>Balance Due</span>
                                        <p className={`font-black text-lg ${balance > 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{formatCurrency(balance)}</p>
                                    </div>
                                </div>

                                {/* Items List */}
                                <div>
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 border-b border-slate-100 pb-2">Line Items</h3>
                                    {orderItems && orderItems.map((item, idx) => (
                                        <div key={idx} className="mb-3 pb-3 border-b border-slate-50 last:border-0">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <p className="font-bold text-sm text-slate-800">{item.qty}x {item.name} {item.color ? `(${item.color})` : ''}</p>
                                                    <p className="text-[10px] text-slate-500 mt-0.5">{item.locations.filter(l=>l.type!=='none').map(l => l.type === 'embroidery' ? 'Embroidery' : 'DTF').join(', ')}</p>
                                                </div>
                                                <span className="font-bold text-sm text-slate-600">{formatCurrency(orderCalc.items[idx].lineTotal)}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Modal Actions Footer */}
                            <div className="p-5 border-t border-slate-200 bg-slate-50 space-y-3">
                                {/* Document Generators */}
                                <div className="flex gap-2">
                                    <button onClick={() => setPdfConfig({ order: selectedOrder, type: 'proposal' })} className="flex-1 bg-white border border-slate-300 text-slate-700 py-2.5 rounded-xl text-xs font-bold hover:bg-slate-100 transition-colors flex justify-center items-center gap-1.5"><Icon name="fileText" size={14} /> Proposal PDF</button>
                                    <button onClick={() => setPdfConfig({ order: selectedOrder, type: 'invoice' })} className="flex-1 bg-white border border-slate-300 text-slate-700 py-2.5 rounded-xl text-xs font-bold hover:bg-slate-100 transition-colors flex justify-center items-center gap-1.5"><Icon name="fileText" size={14} /> Invoice PDF</button>
                                    <button onClick={() => setPdfConfig({ order: selectedOrder, type: 'receipt' })} className="flex-1 bg-white border border-slate-300 text-slate-700 py-2.5 rounded-xl text-xs font-bold hover:bg-slate-100 transition-colors flex justify-center items-center gap-1.5"><Icon name="fileCheck" size={14} /> Receipt PDF</button>
                                </div>

                                {/* State Transitions */}
                                {stage === 'quote' && (
                                    <button onClick={() => handleApproveQuote(selectedOrder)} className="w-full bg-indigo-600 text-white py-3 rounded-xl text-sm font-bold shadow-md hover:bg-indigo-700 active:scale-95 transition-all">
                                        Approve Quote & Log {formatCurrency(selectedOrder.depositAmount)} Deposit
                                    </button>
                                )}
                                {stage !== 'quote' && balance > 0 && (
                                    <button onClick={() => handleClearBalance(selectedOrder)} className="w-full bg-emerald-600 text-white py-3 rounded-xl text-sm font-bold shadow-md hover:bg-emerald-700 active:scale-95 transition-all">
                                        Log Final Payment ({formatCurrency(balance)})
                                    </button>
                                )}
                                {balance === 0 && (
                                    <button onClick={() => handleArchive(selectedOrder.id)} className="w-full bg-slate-800 text-white py-3 rounded-xl text-sm font-bold shadow-md hover:bg-slate-900 active:scale-95 transition-all">
                                        Archive Completed Order
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- HIDDEN PDF TEMPLATE VIEWS ---
            // Rendered off-screen, triggered by html2pdf
            const renderHiddenPDF = () => {
                if(!pdfConfig) return null;
                const { order, type } = pdfConfig;
                const { fullData } = order;
                const oData = fullData.orderData || {};
                const oCalc = fullData.calc || {};
                const title = type === 'proposal' ? 'PROPOSAL' : type === 'invoice' ? 'INVOICE' : 'RECEIPT';

                return (
                    <div style={{ display: 'none' }} ref={pdfGenRef}>
                        <div className="page-container print-no-shadow print-full-width p-12">
                            <div className="flex justify-between items-start mb-8 border-b-2 border-slate-800 pb-8">
                                <div>
                                    <h1 className="text-5xl font-black tracking-tighter text-slate-900">{title}</h1>
                                    <p className="text-slate-500 font-semibold mt-2 tracking-wide">Date: {new Date().toLocaleDateString()}</p>
                                </div>
                                <div className="text-right">
                                    <h2 className="text-2xl font-bold text-slate-900 leading-tight">{order.customer}</h2>
                                    <p className="text-slate-500 font-medium mt-1">ID: {order.id}</p>
                                </div>
                            </div>

                            {oData.orderDescription && (
                                <div className="mb-8 p-5 bg-slate-50 rounded-xl border border-slate-200">
                                    <p className="text-sm text-slate-700 whitespace-pre-wrap">{oData.orderDescription}</p>
                                </div>
                            )}

                            <div className="mb-10">
                                <div className="grid grid-cols-12 gap-4 border-b-2 border-slate-300 pb-2 mb-4 text-xs font-bold text-slate-500 uppercase tracking-widest">
                                    <div className="col-span-8">Description</div><div className="col-span-2 text-center">Qty</div><div className="col-span-2 text-right">Total</div>
                                </div>
                                {oCalc.items && oCalc.items.map((item, idx) => (
                                    <div key={idx} className="mb-4 pb-4 border-b border-slate-100 grid grid-cols-12 gap-4 items-center">
                                        <div className="col-span-8 font-bold text-slate-800">{item.name} {item.color ? `- ${item.color}` : ''}</div>
                                        <div className="col-span-2 text-center font-bold text-slate-600">{item.calculatedQty}</div>
                                        <div className="col-span-2 text-right font-black text-slate-900">{formatCurrency(item.undiscountedLineTotal)}</div>
                                    </div>
                                ))}
                            </div>

                            <div className="w-1/2 ml-auto space-y-3 text-sm">
                                <div className="flex justify-between text-slate-600"><span>Subtotal</span><span>{formatCurrency(oCalc.subtotal)}</span></div>
                                <div className="flex justify-between text-slate-600"><span>Tax</span><span>{formatCurrency(oCalc.tax)}</span></div>
                                <div className="flex justify-between items-end pt-4 border-t-2 border-slate-900">
                                    <span className="font-black text-slate-900 uppercase tracking-widest">Total</span>
                                    <span className="font-black text-2xl text-indigo-700">{formatCurrency(order.total)}</span>
                                </div>
                                
                                <div className="mt-4 pt-4 border-t border-slate-200">
                                    <div className="flex justify-between text-emerald-600 font-bold mb-2"><span>Amount Paid</span><span>-{formatCurrency(order.total - order.balance)}</span></div>
                                    <div className="flex justify-between items-end pt-2">
                                        <span className="font-black text-slate-900 uppercase tracking-widest">Balance Due</span>
                                        <span className="font-black text-xl text-rose-600">{formatCurrency(order.balance)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-content flex flex-col">
                    <div className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30 pt-safe no-print">
                        <div className="max-w-4xl mx-auto flex justify-center p-3">
                            <div className="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                                <button onClick={() => setAppModule('quoter')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'quoter' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500'}`}>Quoter</button>
                                <button onClick={() => setAppModule('pipeline')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'pipeline' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500'}`}>Pipeline</button>
                            </div>
                        </div>
                    </div>

                    <div className="p-4 md:p-6 max-w-4xl w-full mx-auto flex-1">
                        {appModule === 'quoter' && renderQuoter()}
                        {appModule === 'pipeline' && renderPipeline()}
                    </div>

                    {renderModal()}
                    {renderHiddenPDF()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
