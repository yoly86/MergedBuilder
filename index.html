<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Triple One OS Pro</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        input[type="text"], input[type="number"], input[type="date"], select, textarea { font-size: 16px !important; }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .pb-content { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 90px); }
        
        @media print {
            @page { margin: 0; }
            body { background-color: white !important; margin: 1cm !important; }
            .no-print { display: none !important; }
            .print-full-width { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .print-no-shadow { box-shadow: none !important; border: none !important; }
            .page-container { background: transparent !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .soft-input { background-color: #f8fafc; border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .soft-input:focus { background-color: #ffffff; border-color: #818cf8; box-shadow: 0 0 0 3px #e0e7ff; outline: none; }
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900 selection:bg-indigo-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                calculator: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
                user: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                shirt: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>,
                fileText: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>,
                layers: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
                plus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                copy: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
                x: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
                wallet: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
                archive: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>,
                arrowRight: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
                image: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
                calendar: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
                tag: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>,
                percent: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>,
                settings: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                building: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
            };
            return icons[name] || null;
        };

        const STAGES = [
            { id: 'quote', label: '1. Quote Issued', color: 'bg-slate-200 text-slate-800' },
            { id: 'new', label: '2. Deposit Paid', color: 'bg-sky-100 text-sky-800' },
            { id: 'ordering', label: '3. Ordering Blanks', color: 'bg-amber-100 text-amber-800' },
            { id: 'receiving', label: '4. Receiving Blanks', color: 'bg-orange-100 text-orange-800' },
            { id: 'prepping', label: '5. Prepping / DTF', color: 'bg-indigo-100 text-indigo-800' },
            { id: 'printing', label: '6. Emb / Print', color: 'bg-blue-100 text-blue-800' },
            { id: 'pickup', label: '7. Ready for Pickup', color: 'bg-emerald-100 text-emerald-800' },
            { id: 'archived', label: 'Archived', color: 'bg-slate-800 text-white' }
        ];

        const PLACEMENTS = [
            { id: 'custom', label: 'Custom / Other' }, { id: 'fc', label: 'Front - Center Chest' }, { id: 'lc', label: 'Front - Left Chest' }, { id: 'rc', label: 'Front - Right Chest' },
            { id: 'bc', label: 'Back - Center' }, { id: 'yoke', label: 'Back - Yoke / Nape' }, { id: 'sleeve_l', label: 'Left Sleeve' }, { id: 'sleeve_r', label: 'Right Sleeve' }, 
            { id: 'hat_front', label: 'Hat - Front Center' }, { id: 'hat_left', label: 'Hat - Left Panel' }, { id: 'hat_right', label: 'Hat - Right Panel' }, { id: 'hat_back', label: 'Hat - Back Arch' },
            { id: 'pant_l', label: 'Left Leg / Thigh' }, { id: 'pant_r', label: 'Right Leg / Thigh' }
        ];

        const STITCH_MATRIX = [
            { maxStitch: 8000, prices: [15, 15, 14.5, 14.5, 14] },
            { maxStitch: 15000, prices: [22.5, 22, 21, 21, 20] },
            { maxStitch: 20000, prices: [30, 28, 27, 27, 25] },
            { maxStitch: Infinity, prices: [50, 45, 43, 43, 40] }
        ];
        const QTY_TIERS = [{ max: 10, index: 0 }, { max: 49, index: 1 }, { max: 100, index: 2 }, { max: 299, index: 3 }, { max: Infinity, index: 4 }];
        const getEmbroideryCostPerPiece = (stitches, qty) => {
            if (!stitches || stitches <= 0) return 0;
            const sRow = STITCH_MATRIX.find(r => stitches <= r.maxStitch) || STITCH_MATRIX[STITCH_MATRIX.length - 1];
            const qCol = QTY_TIERS.find(q => qty <= q.max) || QTY_TIERS[QTY_TIERS.length - 1];
            return sRow.prices[qCol.index];
        };

        const DTF_SIZES = [
            { id: 'xs', label: 'Extra Small / Hat (2.5"x2.5")' }, { id: 'small', label: 'Small / Left Chest (4"x4")' }, { id: 'medium', label: 'Mid-size / Youth (8"x8")' },
            { id: 'sleeve', label: 'Sleeve / Long Strip' }, { id: 'large', label: 'Standard Full Back (11"x11")' }, { id: 'xlarge', label: 'Oversized (13"x16")' }, { id: 'jumbo', label: 'Jumbo (16"x20")' }
        ];
        const SIZES_LIST = ['XS', 'S', 'M', 'L', 'XL', '2X', '3X', '4X', '5X'];
        const DTF_PRIMARY_FEES = { xs: 8.00, small: 11.33, medium: 16.00, sleeve: 19.50, large: 22.00, xlarge: 28.00, jumbo: 35.00 };
        const DTF_SECONDARY_FEES = { xs: 3.50, small: 4.50, medium: 8.00, sleeve: 10.50, large: 12.00, xlarge: 15.00, jumbo: 20.00 };
        const DTF_MATERIAL_COSTS = { xs: 0.35, small: 0.67, medium: 2.67, sleeve: 1.75, large: 5.04, xlarge: 8.67, jumbo: 12.50 };

        const genId = () => Math.random().toString(36).substr(2, 9);
        const formatCurrency = (val) => '$' + (val || 0).toFixed(2);
        const generateEmptySizes = () => SIZES_LIST.reduce((acc, size) => { acc[size] = ''; return acc; }, {});

        function App() {
            const [appModule, setAppModule] = useState('pipeline'); 
            const [pipelineView, setPipelineView] = useState('active'); 
            const [showInternalBreakdown, setShowInternalBreakdown] = useState(false);
            const [bookTab, setBookTab] = useState('dashboard');
            
            const [selectedOrder, setSelectedOrder] = useState(null); 
            const pdfGenRef = useRef(null);
            const [pdfConfig, setPdfConfig] = useState(null); 
            const [editingOrderId, setEditingOrderId] = useState(null);

            const [orders, setOrders] = useState(() => {
                try { return JSON.parse(localStorage.getItem('t1_orders')) || []; } catch(e) { return []; }
            });
            const [transactions, setTransactions] = useState(() => {
                try { return JSON.parse(localStorage.getItem('t1_ledger')) || []; } catch(e) { return []; }
            });
            const [businessDetails, setBusinessDetails] = useState(() => {
                try { return JSON.parse(localStorage.getItem('t1_biz')) || { name: '', address: '', phone: '', email: '', website: '' }; } 
                catch(e) { return { name: '', address: '', phone: '', email: '', website: '' }; }
            });

            useEffect(() => { localStorage.setItem('t1_orders', JSON.stringify(orders)); }, [orders]);
            useEffect(() => { localStorage.setItem('t1_ledger', JSON.stringify(transactions)); }, [transactions]);
            useEffect(() => { localStorage.setItem('t1_biz', JSON.stringify(businessDetails)); }, [businessDetails]);

            const defaultOrderData = { customerName: '', orderName: '', dateRequired: '', orderDescription: '', designNotes: '', mockupImage: null, setupFees: '', digitizingFee: '', digitizingCost: '', taxRate: 5, discount: '', machineReservePercent: '5' };
            const defaultItem = { id: genId(), name: '', color: '', qty: 1, rawCost: '', shippingCost: '1.00', margin: 35, decoDiscount: '', sizes: generateEmptySizes(), locations: [ { id: genId(), type: 'none', placement: 'custom', desc: '', stitches: '', dtfSize: 'small', isPuff: false, puffMarkup: 5, adjustment: '' } ] };

            const [orderData, setOrderData] = useState(defaultOrderData);
            const [items, setItems] = useState([defaultItem]);

            const updateBiz = (field, value) => setBusinessDetails(prev => ({ ...prev, [field]: value }));
            const updateOrder = (field, value) => setOrderData(prev => ({ ...prev, [field]: value }));
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) { const reader = new FileReader(); reader.onloadend = () => updateOrder('mockupImage', reader.result); reader.readAsDataURL(file); }
                e.target.value = null;
            };
            const updateItem = (itemId, field, value) => setItems(items.map(item => item.id === itemId ? { ...item, [field]: value } : item));
            const updateSize = (itemId, sizeKey, value) => setItems(items.map(item => item.id === itemId ? { ...item, sizes: { ...item.sizes, [sizeKey]: value } } : item));
            const addLocation = (itemId) => setItems(items.map(item => item.id === itemId ? { ...item, locations: [...item.locations, { id: genId(), type: 'none', placement: 'custom', desc: '', stitches: '', dtfSize: 'small', isPuff: false, puffMarkup: 5, adjustment: '' }] } : item));
            const updateLocation = (itemId, locId, field, value) => setItems(items.map(item => item.id === itemId ? { ...item, locations: item.locations.map(loc => loc.id === locId ? { ...loc, [field]: value } : loc) } : item));
            const removeLocation = (itemId, locId) => setItems(items.map(item => item.id === itemId ? { ...item, locations: item.locations.filter(loc => loc.id !== locId) } : item));
            const addItem = () => setItems([...items, { ...defaultItem, id: genId(), locations: [{...defaultItem.locations[0], id: genId()}] }]);
            const duplicateItem = (itemToCopy) => setItems([...items, { ...JSON.parse(JSON.stringify(itemToCopy)), id: genId(), locations: itemToCopy.locations.map(loc => ({ ...loc, id: genId() })) }]);
            const removeItem = (itemId) => { if(items.length > 1) setItems(items.filter(item => item.id !== itemId)); };

            const calc = useMemo(() => {
                let orderGarmentCostTotal = 0, orderGarmentRetailTotal = 0, orderDecoRetailTotal = 0, orderDecoCostTotal = 0, totalDtfCost = 0, totalThreadCost = 0, totalStabilizerCost = 0;
                
                const processedItems = items.map(item => {
                    const sizeSum = SIZES_LIST.reduce((sum, size) => sum + Math.max(0, parseInt(item.sizes?.[size]) || 0), 0);
                    const calculatedQty = sizeSum > 0 ? sizeSum : Math.max(1, parseInt(item.qty) || 1);
                    const rawCost = parseFloat(item.rawCost) || 0;
                    const shipping = parseFloat(item.shippingCost) || 0;
                    const margin = parseFloat(item.margin) || 0;
                    
                    const explicitDecoDiscount = Math.abs(parseFloat(item.decoDiscount) || 0);

                    const landedCost = rawCost + shipping;
                    const effectiveMargin = Math.min(margin, 99.9);
                    const clientGarmentPrice = landedCost / (1 - (effectiveMargin / 100));
                    
                    let dtfCount = 0, itemDecoPerPiece = 0, itemDecoCostPerPiece = 0, itemDtfCost = 0, itemThreadCost = 0, itemStabilizerCost = 0;
                    
                    const processedLocations = item.locations.map(loc => {
                        let baseCost = 0, matCost = 0;
                        if (loc.type === 'embroidery') {
                            baseCost = getEmbroideryCostPerPiece(parseInt(loc.stitches) || 0, calculatedQty);
                            if (loc.isPuff) baseCost += parseFloat(loc.puffMarkup) || 0;
                            let stabCost = 1.00;
                            let threadCost = ((parseInt(loc.stitches) || 0) / 2500);
                            matCost = stabCost + threadCost;
                            itemStabilizerCost += stabCost; itemThreadCost += threadCost;
                        } else if (loc.type === 'dtf') {
                            dtfCount++;
                            baseCost = dtfCount === 1 ? (DTF_PRIMARY_FEES[loc.dtfSize] || 0) : (DTF_SECONDARY_FEES[loc.dtfSize] || 0);
                            matCost = DTF_MATERIAL_COSTS[loc.dtfSize] || 0;
                            itemDtfCost += matCost;
                        }
                        let adjustmentCost = parseFloat(loc.adjustment) || 0;
                        let cost = Math.max(0, baseCost + adjustmentCost);
                        itemDecoPerPiece += cost; 
                        itemDecoCostPerPiece += matCost;
                        return { ...loc, baseCost, cost, materialCost: matCost, isFirstDtf: loc.type === 'dtf' && dtfCount === 1 };
                    });
                    
                    itemDecoPerPiece = Math.max(0, itemDecoPerPiece - explicitDecoDiscount);

                    const totalGarmentCost = landedCost * calculatedQty;
                    const totalGarmentRetail = clientGarmentPrice * calculatedQty;
                    const totalDecoRetail = itemDecoPerPiece * calculatedQty;
                    const totalDecoMaterialCost = itemDecoCostPerPiece * calculatedQty;
                    const lineTotalPerPiece = clientGarmentPrice + itemDecoPerPiece;
                    const lineTotal = lineTotalPerPiece * calculatedQty;
                    const decoDiscountTotal = explicitDecoDiscount * calculatedQty;
                    const undiscountedLineTotal = (clientGarmentPrice + itemDecoPerPiece + explicitDecoDiscount) * calculatedQty;

                    orderGarmentCostTotal += totalGarmentCost; orderGarmentRetailTotal += totalGarmentRetail;
                    orderDecoRetailTotal += totalDecoRetail; orderDecoCostTotal += totalDecoMaterialCost;
                    totalDtfCost += itemDtfCost * calculatedQty; totalThreadCost += itemThreadCost * calculatedQty; totalStabilizerCost += itemStabilizerCost * calculatedQty;

                    return { ...item, calculatedQty, sizeSum, landedCost, clientGarmentPrice, processedLocations, itemDecoPerPiece, totalGarmentRetail, totalDecoRetail, lineTotalPerPiece, lineTotal, undiscountedLineTotal, explicitDecoDiscount, decoDiscountTotal };
                });

                const setup = parseFloat(orderData.setupFees) || 0;
                const digitizing = parseFloat(orderData.digitizingFee) || 0;
                const digitizingCost = parseFloat(orderData.digitizingCost) || 0;
                const discount = Math.abs(parseFloat(orderData.discount) || 0);
                const taxRate = parseFloat(orderData.taxRate) || 0;
                
                const subtotal = orderGarmentRetailTotal + orderDecoRetailTotal + setup + digitizing;
                const discountedSubtotal = Math.max(0, subtotal - discount);
                const tax = discountedSubtotal * (taxRate / 100);
                const grandTotal = discountedSubtotal + tax;
                
                let reservePercent = parseFloat(orderData.machineReservePercent) || 5;
                const machineReserve = discountedSubtotal * (reservePercent / 100);
                const grossProfit = discountedSubtotal - orderGarmentCostTotal;
                const netProfit = grossProfit - orderDecoCostTotal - machineReserve - digitizingCost;
                const deposit = Math.ceil(grandTotal) / 2;

                return { items: processedItems, orderGarmentCostTotal, orderDecoCostTotal, setup, digitizing, digitizingCost, discount, machineReserve, subtotal, discountedSubtotal, tax, grandTotal, netProfit, deposit };
            }, [items, orderData]);

            const getSizeString = (item) => {
                const activeSizes = SIZES_LIST.filter(s => (parseInt(item.sizes?.[s]) || 0) > 0);
                if (activeSizes.length === 0) return null;
                return activeSizes.map(s => `${s}: ${item.sizes[s]}`).join(', ');

                                </div>
                            )}

                            {(type === 'proposal' && oData.designNotes) && (
                                <div style={{ marginBottom: '30px', padding: '20px', backgroundColor: '#eef2ff', borderRadius: '12px', border: '1px solid #e0e7ff' }}>
                                    <h4 style={{ margin: '0 0 10px 0', fontSize: '12px', fontWeight: 'bold', color: '#3730a3', textTransform: 'uppercase', letterSpacing: '1px' }}>Design Notes</h4>
                                    <p style={{ margin: 0, fontSize: '14px', color: '#312e81', lineHeight: '1.6' }}>{oData.designNotes}</p>
                                </div>
                            )}

                            {oData.mockupImage && (
                                <div style={{ marginBottom: '40px', padding: '20px', backgroundColor: '#f8fafc', borderRadius: '12px', border: '1px solid #e2e8f0', textAlign: 'center', breakInside: 'avoid' }}>
                                    <h4 style={{ margin: '0 0 15px 0', fontSize: '10px', fontWeight: 'bold', color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '2px' }}>Approved Design Mockup</h4>
                                    <img src={oData.mockupImage} alt="Mockup" style={{ maxHeight: '2in', width: 'auto', display: 'block', margin: '0 auto', borderRadius: '8px' }} />
                                </div>
                            )}

                            <div style={{ marginBottom: '40px', breakInside: 'avoid' }}>
                                <div style={{ display: 'flex', borderBottom: '2px solid #cbd5e1', paddingBottom: '10px', marginBottom: '15px' }}>
                                    <div style={{ width: '60%', fontSize: '12px', fontWeight: 'bold', color: '#64748b', textTransform: 'uppercase', letterSpacing: '1px' }}>Description</div>
                                    <div style={{ width: '15%', fontSize: '12px', fontWeight: 'bold', color: '#64748b', textTransform: 'uppercase', letterSpacing: '1px', textAlign: 'center' }}>Qty</div>
                                    <div style={{ width: '25%', fontSize: '12px', fontWeight: 'bold', color: '#64748b', textTransform: 'uppercase', letterSpacing: '1px', textAlign: 'right' }}>Total</div>
                                </div>

                                {oCalc.items && oCalc.items.map((item, idx) => {
                                    const activeSizes = SIZES_LIST.filter(s => (parseInt(item.sizes?.[s]) || 0) > 0);
                                    const sizeStr = activeSizes.length > 0 ? activeSizes.map(s => `${s}: ${item.sizes[s]}`).join(', ') : null;
                                    return (
                                    <div key={idx} style={{ display: 'flex', borderBottom: '1px solid #f1f5f9', paddingBottom: '15px', marginBottom: '15px' }}>
                                        <div style={{ width: '60%' }}>
                                            <p style={{ margin: '0 0 5px 0', fontSize: '16px', fontWeight: 'bold', color: '#0f172a' }}>{item.name} {item.color ? `- ${item.color}` : ''}</p>
                                            {sizeStr && <p style={{ margin: '0 0 8px 0', fontSize: '12px', color: '#64748b', fontWeight: 'bold' }}>{sizeStr}</p>}
                                            <div style={{ paddingLeft: '15px', borderLeft: '2px solid #c7d2fe' }}>
                                                {item.locations.filter(l=>l.type!=='none').map((l, i) => {
                                                    const pLabel = PLACEMENTS.find(p=>p.id===l.placement)?.label || 'Custom';
                                                    return (
                                                        <p key={i} style={{ margin: '0 0 3px 0', fontSize: '12px', color: '#475569' }}>
                                                            {l.type === 'embroidery' ? (l.isPuff ? '3D Puff Embroidery' : 'Standard Embroidery') : 'DTF Print'} 
                                                            {l.placement !== 'custom' && ` - ${pLabel}`} 
                                                            {l.desc && ` - ${l.desc}`}
                                                        </p>
                                                    )
                                                })}
                                            </div>
                                            {item.explicitDecoDiscount > 0 && <p style={{ margin: '5px 0 0 0', fontSize: '11px', color: '#059669', fontWeight: 'bold' }}>Includes Item Discount (-{formatCurrency(item.explicitDecoDiscount)}/ea)</p>}
                                        </div>
                                        <div style={{ width: '15%', textAlign: 'center', fontSize: '16px', fontWeight: 'bold', color: '#475569', paddingTop: '2px' }}>{item.calculatedQty}</div>
                                        <div style={{ width: '25%', textAlign: 'right', fontSize: '18px', fontWeight: '900', color: '#0f172a', paddingTop: '2px' }}>{formatCurrency(item.lineTotal)}</div>
                                    </div>
                                )})}
                            </div>

                            <div style={{ width: '50%', marginLeft: 'auto', breakInside: 'avoid' }}>
                                {(oCalc.setup > 0 || oCalc.digitizing > 0) && (
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px', fontSize: '14px', color: '#64748b' }}>
                                        <span>Setup / Fees</span><span>{formatCurrency(oCalc.setup + oCalc.digitizing)}</span>
                                    </div>
                                )}
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px', fontSize: '14px', color: '#475569', fontWeight: 'bold' }}>
                                    <span>Subtotal</span><span>{formatCurrency(oCalc.grossSubtotal)}</span>
                                </div>
                                {oCalc.totalDiscount > 0 && (
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px', fontSize: '14px', color: '#059669', fontWeight: 'bold', backgroundColor: '#ecfdf5', padding: '8px', borderRadius: '6px' }}>
                                        <span>Order Discount</span><span>-{formatCurrency(oCalc.totalDiscount)}</span>
                                    </div>
                                )}
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '15px', fontSize: '14px', color: '#64748b' }}>
                                    <span>Tax ({oData.taxRate}%)</span><span>{formatCurrency(oCalc.tax)}</span>
                                </div>
                                
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', paddingTop: '20px', borderTop: '2px solid #0f172a', marginBottom: '20px' }}>
                                    <span style={{ fontSize: '14px', fontWeight: '900', textTransform: 'uppercase', letterSpacing: '1px' }}>Order Total</span>
                                    <span style={{ fontSize: '28px', fontWeight: '900', color: '#4f46e5' }}>{formatCurrency(order.total)}</span>
                                </div>
                                
                                {type === 'proposal' && (
                                    <div style={{ marginTop: '30px', padding: '25px', backgroundColor: '#f8fafc', borderRadius: '12px', border: '1px solid #e2e8f0', textAlign: 'center' }}>
                                        <p style={{ margin: '0 0 10px 0', fontSize: '11px', fontWeight: 'bold', color: '#64748b', textTransform: 'uppercase', letterSpacing: '1px' }}>Required Deposit to Begin</p>
                                        <p style={{ margin: 0, fontSize: '32px', fontWeight: '900', color: '#0f172a' }}>{formatCurrency(order.depositAmount || (order.total / 2))}</p>
                                        <p style={{ margin: '10px 0 0 0', fontSize: '11px', color: '#94a3b8', fontStyle: 'italic' }}>(*Or you may choose to pay the full balance upfront)</p>
                                    </div>
                                )}

                                {type !== 'proposal' && (
                                    <div style={{ marginTop: '20px', paddingTop: '20px', borderTop: '1px solid #e2e8f0' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px', fontSize: '16px', color: '#059669', fontWeight: 'bold' }}>
                                            <span>Amount Paid</span><span>-{formatCurrency(order.total - order.balance)}</span>
                                        </div>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', paddingTop: '10px' }}>
                                            <span style={{ fontSize: '14px', fontWeight: '900', textTransform: 'uppercase', letterSpacing: '1px' }}>Balance Due</span>
                                            <span style={{ fontSize: '24px', fontWeight: '900', color: order.balance > 0 ? '#e11d48' : '#059669' }}>{formatCurrency(order.balance)}</span>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* PAID IN FULL STAMP */}
                            {(type === 'receipt' && order.balance === 0) && (
                                <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%) rotate(-15deg)', color: 'rgba(16, 185, 129, 0.12)', fontSize: '110px', fontWeight: '900', border: '12px solid rgba(16, 185, 129, 0.12)', padding: '20px 40px', borderRadius: '30px', pointerEvents: 'none', zIndex: 0, whiteSpace: 'nowrap' }}>
                                    PAID IN FULL
                                </div>
                            )}

                            <div style={{ marginTop: '80px', paddingTop: '20px', borderTop: '1px solid #e2e8f0', textAlign: 'center' }}>
                                <p style={{ margin: 0, fontSize: '12px', fontWeight: 'bold', color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '2px' }}>
                                    {type === 'proposal' ? '* Quotes are valid for 14 days from date of issue.' : 'Thank you for your business!'}
                                </p>
                            </div>

                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-content flex flex-col relative z-10">
                    <div className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30 pt-safe no-print">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 p-4">
                            <div><h1 className="text-2xl font-black flex items-center gap-2 tracking-tight text-slate-800"><Icon name="layers" size={28} className="text-indigo-600"/> Triple One OS</h1></div>
                            
                            <div className="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200 w-full md:w-auto overflow-x-auto hide-scrollbar">
                                <button onClick={() => setAppModule('quoter')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'quoter' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500'}`}><Icon name="calculator" size={18} /> Quoter</button>
                                <button onClick={() => setAppModule('pipeline')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'pipeline' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500'}`}><Icon name="layers" size={18} /> Pipeline</button>
                                <button onClick={() => setAppModule('bookkeeping')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'bookkeeping' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500'}`}><Icon name="wallet" size={18} /> Ledger</button>
                                <button onClick={() => setAppModule('settings')} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-5 py-2 rounded-lg text-sm font-bold transition-all ${appModule === 'settings' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}`}><Icon name="settings" size={18} /> Settings</button>
                            </div>
                        </div>
                        {appModule === 'pipeline' && (
                            <div className="bg-slate-50 border-t border-slate-200 flex justify-center p-2">
                                <div className="flex bg-slate-200/50 p-1 rounded-lg">
                                    <button onClick={() => setPipelineView('active')} className={`px-6 py-1.5 text-xs font-bold rounded-md transition-all ${pipelineView === 'active' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}>Active Jobs</button>
                                    <button onClick={() => setPipelineView('archive')} className={`px-6 py-1.5 text-xs font-bold rounded-md transition-all flex items-center gap-1 ${pipelineView === 'archive' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-500'}`}><Icon name="archive" size={14}/> Completed Archives</button>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="p-4 md:p-6 max-w-4xl w-full mx-auto flex-1 h-full relative z-20">
                        {appModule === 'quoter' && renderQuoter()}
                        {appModule === 'pipeline' && pipelineView === 'active' && renderPipelineBoard()}
                        {appModule === 'pipeline' && pipelineView === 'archive' && renderPipelineArchive()}
                        {appModule === 'bookkeeping' && renderBookkeeping()}
                        {appModule === 'settings' && renderSettings()}
                    </div>

                    {renderModal()}
                    {renderHiddenPDF()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
